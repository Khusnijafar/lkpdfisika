<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Energi dalam Kehidupan — LKPD Interaktif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,600&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ RESET & TOKENS ============ */
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
:root{
  --paper:#FBF4E3;
  --paper-deep:#F1E3C2;
  --paper-deeper:#E9D8AE;
  --paper-line:#DEC998;
  --ink:#2A2118;
  --ink-soft:#69594420;
  --ink-soft:#6B5D48;
  --ink-faint:#9C8D74;
  --sun:#E2941F;
  --sun-deep:#A0620E;
  --sun-bright:#F4B23D;
  --teal:#146B70;
  --teal-deep:#0D4F53;
  --teal-bright:#1E8B8F;
  --ember:#B8441A;
  --ember-deep:#8F3513;
  --ember-bright:#D65A2A;
  --stone:#8B8272;
  --stone-deep:#5B5446;
  --cream-on-dark:#F6EAD0;
  --shadow-color:20,12,5;
  --radius-s:6px;
  --radius-m:12px;
  --radius-l:20px;
  --font-display:'Fraunces',serif;
  --font-body:'Source Sans 3',-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
body{
  font-family:var(--font-body);
  color:var(--ink);
  min-height:100vh;
  background-color:#E7D5A6;
  background-image:
    radial-gradient(1100px 700px at 50% -8%, #FFFAEE 0%, #F6E6C0 42%, #E7D5A6 100%);
  overflow-x:hidden;
}
.desk-texture{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:radial-gradient(circle, rgba(42,33,24,.07) 1px, transparent 1.5px);
  background-size:24px 24px;
  opacity:.6;
}
h1,h2,h3,h4{font-family:var(--font-display); margin:0; color:var(--ink); font-weight:700;}
p{margin:0 0 .75em; line-height:1.65;}
button{font-family:inherit;}
::selection{background:var(--sun); color:var(--ink);}

/* scrollbar styling for page faces */
.face::-webkit-scrollbar{width:9px;}
.face::-webkit-scrollbar-track{background:transparent;}
.face::-webkit-scrollbar-thumb{background:var(--paper-deeper); border-radius:10px;}
.face::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);}

/* focus visibility */
a:focus-visible,button:focus-visible,textarea:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--teal-bright); outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ============ APP LAYOUT ============ */
.app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:14px 14px 28px;}

.topbar{
  width:100%; max-width:980px;
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 4px 16px;
  gap:10px;
}
.brand{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.06em;
  color:var(--ink-soft); text-transform:uppercase; text-align:center;
  flex:1;
}
.brand strong{color:var(--ember-deep);}
.chip-btn{
  display:inline-flex; align-items:center; gap:7px;
  background:var(--paper); border:1.5px solid var(--paper-line);
  color:var(--ink); font-family:var(--font-mono); font-size:12.5px; font-weight:500;
  padding:8px 14px; border-radius:999px; cursor:pointer;
  box-shadow:0 2px 6px rgba(var(--shadow-color),.12);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  white-space:nowrap;
}
.chip-btn:hover{transform:translateY(-1px); box-shadow:0 5px 12px rgba(var(--shadow-color),.18); background:#fff9ea;}
.chip-btn:active{transform:translateY(0);}
.chip-btn .ico{width:15px; height:15px; flex:none;}

.stage{width:100%; display:flex; justify-content:center; flex:1;}

/* ============ BOOK FRAME ============ */
.book{
  position:relative;
  width:min(760px, 94vw);
  height:min(900px, 84vh);
  margin:0 auto;
}
.spine{
  position:absolute; left:-16px; top:8px; bottom:8px; width:30px; z-index:3;
  background:linear-gradient(180deg,#3a2f22,#1c1712 60%,#140f0b);
  border-radius:12px 3px 3px 12px;
  box-shadow:inset -5px 0 10px rgba(0,0,0,.45), -4px 4px 14px rgba(var(--shadow-color),.35);
  display:flex; align-items:center; justify-content:center;
}
.spine-title{
  writing-mode:vertical-rl; transform:rotate(180deg);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.22em;
  color:var(--sun); text-transform:uppercase; white-space:nowrap; opacity:.92;
}
.page-edges{
  position:absolute; right:-5px; top:10px; bottom:10px; width:9px; z-index:1;
  background:repeating-linear-gradient(180deg,#EFE2C2 0 2px,#DFCB9E 2px 3px);
  border-radius:0 7px 7px 0;
  box-shadow:2px 0 5px rgba(0,0,0,.18) inset, 3px 2px 6px rgba(var(--shadow-color),.2);
}
.book-inner{
  position:relative; z-index:2; height:100%;
  background:var(--paper);
  border-radius:5px 16px 16px 5px;
  box-shadow:0 34px 64px -22px rgba(var(--shadow-color),.5), 0 14px 30px -14px rgba(var(--shadow-color),.35);
  display:flex; flex-direction:column;
  padding:0 3px;
  overflow:hidden;
}
.book-header{
  flex:none; padding:16px 26px 10px; display:flex; flex-direction:column; gap:8px;
  border-bottom:1px solid var(--paper-line);
}
.running-head{
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--teal-deep); font-weight:500;
}
.progress-track{height:4px; border-radius:4px; background:var(--paper-deeper); overflow:hidden;}
.progress-fill{height:100%; width:5%; border-radius:4px; background:linear-gradient(90deg,var(--sun),var(--teal)); transition:width .5s ease;}

.flip-stage{position:relative; flex:1; min-height:0; perspective:2600px; margin:0 6px;}
.flipper{
  position:absolute; inset:0;
  transform-style:preserve-3d;
  transform:rotateY(0deg);
  transform-origin:0% 50%;
  transition:transform .68s cubic-bezier(.61,.04,.36,1);
  filter:drop-shadow(-8px 10px 20px rgba(var(--shadow-color),.28));
}
.flipper.no-anim{transition:none;}
.flipper.flip-next{transform:rotateY(-179.9deg);}
.flipper.flip-prev{transform:rotateY(179.9deg);}
.face{
  position:absolute; inset:0;
  background:var(--paper);
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow-y:auto; overflow-x:hidden;
  padding:20px 26px 26px;
}
.face-back{transform:rotateY(180deg); pointer-events:none;}

.book-footer{
  flex:none; padding:10px 26px 16px; display:flex; align-items:center; justify-content:center; gap:18px;
}
.nav-btn{
  width:38px; height:38px; border-radius:50%; border:1.5px solid var(--paper-line);
  background:var(--paper); color:var(--ink); font-size:19px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 6px rgba(var(--shadow-color),.14);
  transition:transform .15s ease, background .15s ease, opacity .15s ease;
}
.nav-btn:hover:not(:disabled){transform:translateY(-2px); background:#fff8e8;}
.nav-btn:disabled{opacity:.3; cursor:not-allowed;}
.page-indicator{font-family:var(--font-mono); font-size:12.5px; color:var(--ink-soft); min-width:64px; text-align:center;}

@media (max-width:640px){
  .book{width:100vw; height:calc(100vh - 118px); margin:0;}
  .spine{left:-10px; width:20px;}
  .spine-title{font-size:9px;}
  .page-edges{right:-3px; width:6px;}
  .book-inner{border-radius:3px 10px 10px 3px;}
  .face{padding:16px 16px 20px;}
  .book-header{padding:12px 16px 8px;}
  .book-footer{padding:8px 16px 12px;}
}

/* ============ TOC DRAWER ============ */
.toc-overlay{
  position:fixed; inset:0; z-index:50; display:none;
  background:rgba(20,15,10,.45); backdrop-filter:blur(2px);
}
.toc-overlay.open{display:block;}
.toc-panel{
  position:absolute; left:0; top:0; bottom:0; width:min(340px,88vw);
  background:var(--paper); box-shadow:12px 0 40px rgba(0,0,0,.35);
  display:flex; flex-direction:column;
  transform:translateX(-100%); transition:transform .35s cubic-bezier(.2,.8,.3,1);
}
.toc-overlay.open .toc-panel{transform:translateX(0);}
.toc-panel-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px; border-bottom:1px solid var(--paper-line);
  font-family:var(--font-display); font-weight:700; font-size:19px;
}
.toc-panel-head button{
  width:32px; height:32px; border-radius:50%; border:none; background:var(--paper-deep);
  cursor:pointer; font-size:15px; color:var(--ink-soft);
}
.toc-list{flex:1; overflow-y:auto; padding:8px 0;}
.toc-item{
  display:flex; align-items:baseline; gap:10px; width:100%; text-align:left;
  background:none; border:none; cursor:pointer; padding:9px 20px;
  font-family:var(--font-body); font-size:14.5px; color:var(--ink);
  border-left:3px solid transparent;
}
.toc-item:hover{background:var(--paper-deep);}
.toc-item.active{border-left-color:var(--ember); background:var(--paper-deep); font-weight:600;}
.toc-item .num{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); min-width:20px;}
.toc-item.section-label{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--teal-deep); font-weight:600; padding:14px 20px 5px; cursor:default; pointer-events:none;
}
.toc-panel-foot{padding:14px 20px 20px; border-top:1px solid var(--paper-line);}
.toc-reset{
  width:100%; padding:10px; border-radius:10px; border:1.5px solid var(--ember);
  background:none; color:var(--ember-deep); font-weight:600; font-size:13px; cursor:pointer;
}
.toc-reset:hover{background:#fbe9df;}

/* ============ SAVE TOAST ============ */
.save-toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--teal-deep); color:#fff; font-family:var(--font-mono); font-size:12.5px;
  padding:9px 18px; border-radius:999px; box-shadow:0 8px 20px rgba(0,0,0,.25);
  opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease; z-index:60;
}
.save-toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ============ CONTENT TYPOGRAPHY ============ */
.eyebrow{
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ember-deep); font-weight:600; margin-bottom:6px; display:block;
}
.page-title{font-size:clamp(21px,4.4vw,28px); line-height:1.18; margin-bottom:4px;}
.page-sub{font-family:var(--font-body); color:var(--ink-soft); font-size:14.5px; margin-bottom:18px;}
.section-block{margin-bottom:22px;}
.section-block:last-child{margin-bottom:4px;}
.lead-text{font-size:15.5px; line-height:1.72; color:var(--ink);}
.hairline{border:none; border-top:1px dashed var(--paper-line); margin:18px 0;}

/* ============ COVER PAGE ============ */
.cover{height:100%; display:flex; flex-direction:column;}
.cover-uni{
  text-align:center; font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
  color:var(--teal-deep); text-transform:uppercase; padding-top:2px;
}
.cover-uni b{display:block; font-size:12.5px; color:var(--ink); letter-spacing:.06em; margin-top:2px;}
.cover-emblem{display:flex; justify-content:center; margin:14px 0 6px;}
.cover-emblem svg{width:clamp(110px,22vw,150px); height:auto;}
.cover-titles{text-align:center; margin:6px 0 16px;}
.cover-kind{font-family:var(--font-mono); font-size:11.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ember-deep); margin-bottom:8px;}
.cover-title{font-size:clamp(26px,6.2vw,38px); line-height:1.06; font-weight:900;}
.cover-title em{font-style:italic; color:var(--teal-deep);}
.cover-subtitle{font-family:var(--font-body); font-style:italic; color:var(--ink-soft); font-size:14.5px; margin-top:9px;}
.cover-badges{display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin:16px 0;}
.badge{
  font-family:var(--font-mono); font-size:11.5px; padding:6px 12px; border-radius:999px;
  border:1px solid var(--paper-line); color:var(--teal-deep); background:var(--paper-deep);
}
.cover-group{
  background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:var(--radius-m);
  padding:14px 18px; margin:8px auto 0; max-width:420px; width:100%;
}
.cover-group-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:8px; text-align:center;}
.people-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px;}
.people-list li{display:flex; justify-content:space-between; font-size:13.5px; gap:10px; border-bottom:1px dotted var(--paper-line); padding-bottom:4px;}
.people-list li:last-child{border-bottom:none; padding-bottom:0;}
.people-list .npm{font-family:var(--font-mono); color:var(--ink-faint); font-size:12px; white-space:nowrap;}
.cover-spacer{flex:1;}
.cover-cta{
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:var(--ember); color:#fff8ec; border:none; border-radius:999px;
  font-family:var(--font-body); font-weight:700; font-size:15px; letter-spacing:.02em;
  padding:13px 26px; margin:18px auto 6px; cursor:pointer; width:fit-content;
  box-shadow:0 10px 22px -8px rgba(184,68,26,.55);
  transition:transform .15s ease, box-shadow .15s ease;
}
.cover-cta:hover{transform:translateY(-2px); box-shadow:0 14px 26px -8px rgba(184,68,26,.6);}
.cover-foot{text-align:center; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); padding-bottom:2px;}

/* ============ IDENTITY + TOC-IN-PAGE ============ */
.field-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; margin-bottom:8px;}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--teal-deep); font-weight:600;}
.field input{
  font-family:var(--font-body); font-size:15px; color:var(--ink);
  border:none; border-bottom:1.5px solid var(--paper-deeper); background:transparent;
  padding:5px 2px 8px; outline:none; transition:border-color .15s;
}
.field input:focus{border-color:var(--ember);}
.field input::placeholder{color:var(--ink-faint); font-style:italic;}

.mini-toc{list-style:none; margin:6px 0 0; padding:0; display:flex; flex-direction:column; gap:1px;}
.mini-toc-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:none; border:none; border-bottom:1px solid var(--paper-line);
  padding:9px 4px; cursor:pointer; font-family:var(--font-body); font-size:14px; color:var(--ink);
}
.mini-toc-item:hover{color:var(--ember-deep);}
.mini-toc-item .letter{
  font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--sun-deep); min-width:22px;
}
.mini-toc-item .dots{flex:1; border-bottom:1px dotted var(--paper-deeper); margin:0 4px; height:0;}
.mini-toc-item .pg{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint);}

/* ============ KD / TUJUAN LISTS ============ */
.goal-card{
  background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:var(--radius-m);
  padding:16px 18px; margin-bottom:14px;
}
.goal-card h3{font-size:14px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.08em; color:var(--teal-deep); margin-bottom:11px; font-weight:600;}
.num-list{list-style:none; margin:0; padding:0; counter-reset:num;}
.num-list li{
  counter-increment:num; display:flex; gap:11px; font-size:14.5px; line-height:1.55;
  margin-bottom:10px; align-items:flex-start;
}
.num-list li:last-child{margin-bottom:0;}
.num-list li::before{
  content:counter(num); flex:none; width:23px; height:23px; border-radius:50%;
  background:var(--sun); color:#3a2405; font-family:var(--font-mono); font-weight:700; font-size:12px;
  display:flex; align-items:center; justify-content:center; margin-top:1px;
}

/* ============ INSTRUCTION LIST (B) ============ */
.instr-callout{
  border:1.5px solid var(--paper-line); border-radius:var(--radius-m); padding:16px 18px 6px;
  background:linear-gradient(180deg,#fffdf6,var(--paper-deep));
}
.instr-callout > p:first-child{font-weight:600; font-size:14.5px; margin-bottom:12px;}
.instr-list{list-style:none; margin:0; padding:0;}
.instr-list li{display:flex; gap:12px; font-size:14px; line-height:1.55; margin-bottom:13px; align-items:flex-start;}
.instr-list .ico{flex:none; width:26px; height:26px; color:var(--teal-deep); margin-top:1px;}
.instr-list .ico svg{width:100%; height:100%;}

/* ============ FLOW DIAGRAM (C.1) ============ */
.law-box{
  background:var(--paper-deep); border-left:4px solid var(--ember); border-radius:0 var(--radius-s) var(--radius-s) 0;
  padding:13px 16px; font-size:14.5px; line-height:1.6; margin-bottom:20px;
}
.flow-wrap{display:flex; flex-direction:column; align-items:stretch; gap:0; margin-bottom:8px;}
.flow-step{
  display:flex; align-items:center; gap:12px; background:var(--paper-deep);
  border:1px solid var(--paper-line); border-radius:var(--radius-m); padding:11px 14px;
}
.flow-step .ico{
  flex:none; width:38px; height:38px; border-radius:50%; background:var(--paper);
  display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(var(--shadow-color),.15);
}
.flow-step .ico svg{width:22px; height:22px;}
.flow-step .txt b{display:block; font-size:13.5px; font-weight:700;}
.flow-step .txt span{font-size:12px; color:var(--ink-soft);}
.flow-arrow{display:flex; justify-content:center; padding:3px 0;}
.flow-arrow svg{width:16px; height:22px; color:var(--ink-faint);}
.flow-branch{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:2px;}
.flow-branch .flow-step{flex-direction:column; text-align:center; gap:6px; padding:12px 8px;}

/* ============ FOOD-CHAIN ILLUSTRATION (Kegiatan 1) ============ */
.foodchain{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:8px; justify-content:center;}
.fc-node{
  display:flex; flex-direction:column; align-items:center; gap:2px; text-align:center;
  background:var(--paper-deep); border:1.5px solid var(--paper-line); border-radius:var(--radius-s);
  padding:9px 11px; min-width:76px;
}
.fc-node.fc-decomposer{background:#F1ECE2; border-color:var(--stone);}
.fc-tier{font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--teal-deep); font-weight:600;}
.fc-name{font-family:var(--font-display); font-weight:700; font-size:13.5px;}
.fc-arrow{flex:none; color:var(--ink-faint); font-size:15px;}
.fc-loop-note{font-size:12px; font-style:italic; color:var(--ink-soft); text-align:center; margin:6px 0 18px;}

/* ============ COMPARE GRID (C.2) ============ */
.compare-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.compare-card{border-radius:var(--radius-m); padding:15px 15px 16px; border:1.5px solid;}
.compare-card.tak{background:#F1ECE2; border-color:var(--stone);}
.compare-card.bar{background:#FDF3E1; border-color:var(--sun);}
.compare-card h4{font-size:13.5px; margin-bottom:9px; display:flex; align-items:center; gap:7px;}
.compare-card.tak h4{color:var(--stone-deep);}
.compare-card.bar h4{color:var(--sun-deep);}
.compare-card h4 svg{width:17px; height:17px;}
.compare-card ul{margin:0 0 10px; padding-left:18px; font-size:13px; line-height:1.6;}
.compare-card .ciri{font-size:11.5px; line-height:1.55; font-style:italic; color:var(--ink-soft); border-top:1px dashed rgba(0,0,0,.15); padding-top:8px;}
@media (max-width:520px){.compare-grid{grid-template-columns:1fr;}}

/* ============ ENERGY TYPE CARDS (C.3) ============ */
.energy-cards{display:flex; flex-direction:column; gap:10px;}
.energy-card{
  display:grid; grid-template-columns:40px 1fr; gap:12px;
  background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:var(--radius-m); padding:12px 14px;
}
.energy-card .ico{width:40px; height:40px; border-radius:10px; background:var(--paper); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(var(--shadow-color),.13);}
.energy-card .ico svg{width:24px; height:24px; color:var(--teal-deep);}
.energy-card h4{font-size:13.5px; margin-bottom:3px;}
.energy-card p{font-size:12.5px; line-height:1.5; margin:0 0 4px; color:var(--ink);}
.energy-card .contoh{font-size:11.5px; color:var(--teal-deep); font-weight:600;}

/* ============ CASE STUDY BOX ============ */
.case-box{
  background:#FFF7E4; border:1.5px solid var(--sun); border-radius:var(--radius-m);
  padding:15px 17px; margin-bottom:18px; position:relative;
}
.case-box-tag{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10.5px;
  letter-spacing:.08em; text-transform:uppercase; color:var(--ember-deep); font-weight:700; margin-bottom:9px;
}
.case-box-tag svg{width:14px; height:14px;}
.case-box p{font-size:13.5px; line-height:1.62; margin-bottom:10px;}
.case-box p:last-child{margin-bottom:0;}

/* ============ Q&A BLOCK ============ */
.qa{margin-bottom:16px;}
.qa:last-child{margin-bottom:4px;}
.qa-q{display:flex; gap:9px; font-size:14px; line-height:1.55; margin-bottom:8px;}
.qa-q .tag{flex:none; font-family:var(--font-mono); font-weight:700; color:var(--ember-deep); font-size:13px;}
.qa textarea, .fill-table textarea, .reflect-cell textarea{
  width:100%; font-family:var(--font-body); font-size:13.7px; line-height:1.55; color:var(--ink);
  background:#fffdf7; border:1.5px solid var(--paper-deeper); border-radius:var(--radius-s);
  padding:9px 11px; resize:vertical; outline:none; transition:border-color .15s, background .15s;
}
.qa textarea{min-height:64px;}
.qa textarea:focus, .fill-table textarea:focus, .reflect-cell textarea:focus{border-color:var(--teal-bright); background:#fff;}
.qa textarea::placeholder, .fill-table textarea::placeholder, .reflect-cell textarea::placeholder{color:var(--ink-faint); font-style:italic;}

/* ============ FILL TABLE ============ */
.fill-table{width:100%; border-collapse:collapse; font-size:13px;}
.fill-table th{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
  color:var(--teal-deep); text-align:left; padding:6px 8px; border-bottom:2px solid var(--paper-deeper);
}
.fill-table td{padding:6px 7px; vertical-align:top; border-bottom:1px solid var(--paper-line);}
.fill-table td.label-cell{font-weight:600; font-size:13px; width:34%; padding-top:11px; color:var(--ink);}
.fill-table textarea{min-height:44px;}
.fill-table.two-col td.label-cell{width:32%;}

/* ============ MCQ ============ */
.mcq{margin-bottom:20px; border-bottom:1px dashed var(--paper-line); padding-bottom:16px;}
.mcq:last-child{border-bottom:none;}
.mcq-q{font-size:14px; line-height:1.55; margin-bottom:10px; display:flex; gap:8px;}
.mcq-q .tag{flex:none; font-family:var(--font-mono); font-weight:700; color:var(--ember-deep);}
.mcq-opts{display:flex; flex-direction:column; gap:7px;}
.mcq-opt{
  display:flex; align-items:center; gap:10px; text-align:left; width:100%;
  background:#fffdf7; border:1.5px solid var(--paper-deeper); border-radius:var(--radius-s);
  padding:8px 12px; cursor:pointer; font-size:13.3px; color:var(--ink); font-family:var(--font-body);
  transition:border-color .15s, background .15s;
}
.mcq-opt:hover{border-color:var(--teal-bright);}
.mcq-opt .letter{
  flex:none; width:21px; height:21px; border-radius:50%; border:1.5px solid var(--ink-faint);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; font-weight:600;
  color:var(--ink-soft);
}
.mcq-opt.selected{border-color:var(--ember); background:#FCEFE6;}
.mcq-opt.selected .letter{background:var(--ember); border-color:var(--ember); color:#fff;}

/* ============ DRAWING PAD ============ */
.pad-toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:9px; padding:8px 10px; background:var(--paper-deep); border-radius:var(--radius-s);}
.pad-group{display:flex; align-items:center; gap:5px;}
.pad-group .glabel{font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin-right:2px;}
.swatch{width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:0;}
.swatch.active{border-color:var(--ink);}
.pad-size{width:20px; height:20px; border-radius:50%; background:var(--ink); cursor:pointer; border:2px solid transparent; padding:0; display:flex; align-items:center; justify-content:center;}
.pad-size.active{border-color:var(--ember);}
.pad-btn{
  font-family:var(--font-mono); font-size:11px; padding:6px 11px; border-radius:7px; border:1px solid var(--paper-deeper);
  background:#fff; cursor:pointer; color:var(--ink-soft); display:flex; align-items:center; gap:5px;
}
.pad-btn:hover{background:var(--paper-deeper);}
.pad-btn svg{width:13px; height:13px;}
.pad-canvas-wrap{border:1.5px dashed var(--paper-deeper); border-radius:var(--radius-m); overflow:hidden; background:#fffefa; touch-action:none;}
.pad-canvas-wrap canvas{width:100%; height:auto; display:block; cursor:crosshair;}

/* ============ CHAPTER OPENER / DIVIDER ============ */
.divider-page{min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:12px; padding:20px 0;}
.divider-page .ico-big{width:60px; height:60px; color:var(--sun-deep);}
.divider-page .ico-big svg{width:100%; height:100%;}
.divider-kicker{font-family:var(--font-mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ember-deep); font-weight:700;}
.divider-page h2{font-size:clamp(21px,5vw,28px);}
.divider-page .lead-text{max-width:440px;}
.preview-list{list-style:none; margin:8px 0 0; padding:0; display:flex; flex-direction:column; gap:8px; text-align:left; max-width:380px; width:100%;}
.preview-list li{display:flex; gap:9px; font-size:13.5px; align-items:center; background:var(--paper-deep); border-radius:var(--radius-s); padding:9px 12px;}
.preview-list .n{font-family:var(--font-mono); font-weight:700; color:var(--sun-deep); font-size:13px;}

/* ============ REFLECTION GRID ============ */
.reflect-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.reflect-cell label{display:block; font-size:12.5px; font-weight:600; color:var(--teal-deep); margin-bottom:6px; line-height:1.35;}
.reflect-cell textarea{min-height:90px;}
@media (max-width:520px){.reflect-grid{grid-template-columns:1fr;}}

/* ============ BIBLIOGRAPHY ============ */
.biblio-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:13px;}
.biblio-list li{font-size:13.3px; line-height:1.6; padding-left:22px; text-indent:-22px;}
.biblio-list li i{font-style:italic;}

/* ============ BACK COVER ============ */
.backcover{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px;}
.backcover .ico-big{width:56px; height:56px; color:var(--teal-deep); margin-bottom:4px;}
.backcover .ico-big svg{width:100%; height:100%;}
.backcover h2{font-size:clamp(22px,5vw,29px);}
.backcover .lead-text{max-width:420px; margin-bottom:6px;}
.backcover .cover-cta{background:var(--teal-deep); box-shadow:0 10px 22px -8px rgba(13,79,83,.5);}
.backcover .cover-cta:hover{box-shadow:0 14px 26px -8px rgba(13,79,83,.55);}
.link-btn{background:none; border:none; color:var(--teal-deep); font-family:var(--font-mono); font-size:12.5px; text-decoration:underline; cursor:pointer; padding:6px;}

/* ============ INFO NOTE / DID-YOU-KNOW ============ */
.info-note{
  display:flex; gap:11px; align-items:flex-start;
  background:linear-gradient(180deg,#F1F6F2,#E6F0EC);
  border:1px solid #BEDAD0; border-radius:var(--radius-m);
  padding:12px 15px; margin:16px 0; font-size:13px; line-height:1.6; color:var(--teal-deep);
}
.info-note .ico{flex:none; width:22px; height:22px; color:var(--teal-bright); margin-top:1px;}
.info-note .ico svg{width:100%; height:100%;}
.info-note b{color:var(--teal-deep);}

/* ============ FORMULA CARDS (C.4) ============ */
.forms-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin-bottom:18px;}
.form-chip{
  display:flex; align-items:center; gap:9px; background:var(--paper-deep);
  border:1px solid var(--paper-line); border-radius:var(--radius-s); padding:9px 11px;
}
.form-chip .ico{flex:none; width:30px; height:30px; border-radius:8px; background:var(--paper); display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(var(--shadow-color),.12);}
.form-chip .ico svg{width:19px; height:19px; color:var(--ember);}
.form-chip b{display:block; font-size:12.5px; line-height:1.2;}
.form-chip span{font-size:11px; color:var(--ink-soft);}
@media (max-width:520px){.forms-grid{grid-template-columns:1fr;}}

.formula-stack{display:flex; flex-direction:column; gap:11px; margin:6px 0 4px;}
.formula-card{
  position:relative; overflow:hidden;
  background:linear-gradient(155deg,#2B2318 0%,#1D1710 100%);
  border-radius:var(--radius-m); padding:15px 17px 14px;
  box-shadow:0 8px 20px -10px rgba(var(--shadow-color),.5);
}
.formula-card::before{
  content:""; position:absolute; right:-30px; top:-30px; width:110px; height:110px;
  background:radial-gradient(circle, rgba(226,148,31,.28), transparent 70%); pointer-events:none;
}
.formula-card .fc-name{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--sun-bright); font-weight:600; margin-bottom:8px;}
.formula-eq{
  font-family:var(--font-display); font-size:clamp(23px,5.6vw,29px); color:var(--cream-on-dark);
  font-weight:600; letter-spacing:.01em; line-height:1.2; margin-bottom:12px;
}
.formula-eq sub{font-size:.52em; font-weight:500; opacity:.9;}
.formula-eq sup{font-size:.55em;}
.formula-eq .frac{display:inline-flex; flex-direction:column; text-align:center; font-size:.62em; line-height:1.05; vertical-align:middle; margin:0 2px;}
.formula-eq .frac .top{border-bottom:1.5px solid var(--cream-on-dark); padding:0 4px;}
.formula-eq .frac .bot{padding:0 4px;}
.formula-legend{display:flex; flex-wrap:wrap; gap:5px 14px; font-family:var(--font-mono); font-size:11px; color:#D9C9A8;}
.formula-legend span{white-space:nowrap;}
.formula-legend b{color:var(--sun-bright); font-weight:600;}

/* ============ WORKED EXAMPLE ============ */
.worked{
  background:#FBF6EA; border:1.5px solid var(--paper-deeper); border-radius:var(--radius-m);
  padding:0; margin:16px 0; overflow:hidden;
}
.worked-head{
  display:flex; align-items:center; gap:8px; background:var(--teal-deep); color:var(--cream-on-dark);
  padding:9px 15px; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:600;
}
.worked-head svg{width:15px; height:15px;}
.worked-body{padding:13px 16px 15px;}
.worked-body .prob{font-size:13.5px; line-height:1.6; margin-bottom:12px; padding-bottom:12px; border-bottom:1px dashed var(--paper-deeper);}
.worked-step{display:flex; gap:10px; margin-bottom:9px; font-size:13px; line-height:1.55;}
.worked-step .s-num{flex:none; width:20px; height:20px; border-radius:50%; background:var(--sun); color:#3a2405; font-family:var(--font-mono); font-weight:700; font-size:11px; display:flex; align-items:center; justify-content:center;}
.worked-math{font-family:var(--font-mono); font-size:12.5px; background:#FFFCF4; border:1px solid var(--paper-deeper); border-radius:6px; padding:6px 10px; margin:4px 0 2px; display:inline-block; color:var(--ember-deep);}
.worked-answer{margin-top:11px; padding:10px 13px; background:#EAF3EF; border-left:4px solid var(--teal-bright); border-radius:0 var(--radius-s) var(--radius-s) 0; font-size:13px;}
.worked-answer b{color:var(--teal-deep);}

/* ============ INTERACTIVE CALCULATOR (Lab) ============ */
.lab-intro{font-size:13.5px; line-height:1.65; margin-bottom:14px;}
.calc{
  background:linear-gradient(180deg,#fffdf7,var(--paper-deep));
  border:1.5px solid var(--paper-line); border-radius:var(--radius-l);
  padding:16px 16px 18px; margin-bottom:16px; box-shadow:0 4px 14px -8px rgba(var(--shadow-color),.25);
}
.calc-title{display:flex; align-items:center; gap:8px; font-family:var(--font-display); font-weight:700; font-size:15.5px; margin-bottom:4px;}
.calc-title .dot{width:9px; height:9px; border-radius:50%; background:var(--ember); box-shadow:0 0 0 4px rgba(184,68,26,.16);}
.calc-sub{font-size:12px; color:var(--ink-soft); margin-bottom:14px;}
.calc-row{margin-bottom:14px;}
.calc-row .rl{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
.calc-row .rl label{font-family:var(--font-mono); font-size:11px; letter-spacing:.03em; color:var(--teal-deep); font-weight:600; text-transform:uppercase;}
.calc-val{font-family:var(--font-mono); font-size:13px; color:var(--ember-deep); font-weight:600; background:#fff; border:1px solid var(--paper-deeper); border-radius:6px; padding:2px 9px;}
.calc-slider{
  -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:6px;
  background:linear-gradient(90deg,var(--sun),var(--teal-bright)); outline:none; cursor:pointer;
}
.calc-slider::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; border:3px solid var(--ember); cursor:pointer; box-shadow:0 2px 5px rgba(var(--shadow-color),.3);}
.calc-slider::-moz-range-thumb{width:20px; height:20px; border-radius:50%; background:#fff; border:3px solid var(--ember); cursor:pointer;}
.calc-readout{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:6px;}
.readout-card{background:#2B2318; border-radius:var(--radius-m); padding:12px 10px; text-align:center; position:relative; overflow:hidden;}
.readout-card .rc-label{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--sun-bright); margin-bottom:5px;}
.readout-card .rc-value{font-family:var(--font-display); font-size:clamp(18px,4.6vw,23px); font-weight:700; color:var(--cream-on-dark); line-height:1; transition:color .2s;}
.readout-card .rc-unit{font-family:var(--font-mono); font-size:10px; color:#B9A986; margin-top:3px;}
.readout-card.flash .rc-value{color:var(--sun-bright);}
.calc-bar-wrap{margin-top:13px;}
.calc-bar-wrap .bl{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; color:var(--ink-soft); margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em;}
.calc-bar{height:22px; border-radius:7px; background:var(--paper-deeper); overflow:hidden; display:flex;}
.calc-bar .seg-ek{background:linear-gradient(90deg,var(--ember-bright),var(--ember)); transition:width .3s ease;}
.calc-bar .seg-ep{background:linear-gradient(90deg,var(--teal-bright),var(--teal)); transition:width .3s ease;}
.calc-legend{display:flex; gap:16px; margin-top:8px; font-size:11.5px; color:var(--ink-soft);}
.calc-legend i{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:middle;}
.calc-note{font-size:12px; font-style:italic; color:var(--ink-soft); margin-top:12px; line-height:1.55; display:flex; gap:8px;}
.calc-note svg{flex:none; width:16px; height:16px; color:var(--sun-deep); margin-top:1px;}
.calc-select{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px;}
.calc-preset{font-family:var(--font-mono); font-size:11px; padding:6px 11px; border-radius:999px; border:1.5px solid var(--paper-deeper); background:#fff; cursor:pointer; color:var(--ink-soft); transition:all .15s;}
.calc-preset:hover{border-color:var(--teal-bright); color:var(--teal-deep);}
.calc-preset.active{background:var(--teal-deep); border-color:var(--teal-deep); color:var(--cream-on-dark);}

/* ============ MCQ SELF-CHECK ADDITIONS ============ */
.mcq-opt .letter .tick{display:none;}
.mcq-opt.correct{border-color:var(--teal-bright); background:#E7F3EE;}
.mcq-opt.correct .letter{background:var(--teal-bright); border-color:var(--teal-bright); color:#fff;}
.mcq-opt.incorrect{border-color:var(--ember); background:#FBEBE4;}
.mcq-opt.incorrect .letter{background:var(--ember); border-color:var(--ember); color:#fff;}
.mcq-opt.locked{cursor:default;}
.mcq-opt.dimmed{opacity:.55;}
.mcq-feedback{
  display:none; margin-top:10px; padding:11px 13px; border-radius:var(--radius-s); font-size:12.7px; line-height:1.6;
  border-left:4px solid;
}
.mcq-feedback.show{display:block; animation:fbIn .3s ease;}
.mcq-feedback.right{background:#E7F3EE; border-color:var(--teal-bright); color:var(--teal-deep);}
.mcq-feedback.wrong{background:#FBEBE4; border-color:var(--ember); color:var(--ember-deep);}
.mcq-feedback .fb-verdict{font-family:var(--font-mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; display:block; margin-bottom:4px;}
@keyframes fbIn{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);}}

.quiz-actions{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:6px; padding-top:16px; border-top:1px dashed var(--paper-line);}
.quiz-btn{
  display:inline-flex; align-items:center; gap:8px; background:var(--teal-deep); color:var(--cream-on-dark);
  border:none; border-radius:999px; font-family:var(--font-body); font-weight:700; font-size:13.5px;
  padding:10px 20px; cursor:pointer; box-shadow:0 6px 16px -8px rgba(13,79,83,.6); transition:transform .15s ease, box-shadow .15s ease;
}
.quiz-btn:hover{transform:translateY(-1px); box-shadow:0 9px 20px -8px rgba(13,79,83,.65);}
.quiz-btn svg{width:16px; height:16px;}
.quiz-btn.ghost{background:none; color:var(--teal-deep); border:1.5px solid var(--paper-deeper); box-shadow:none;}
.quiz-btn.ghost:hover{background:var(--paper-deep);}
.quiz-score{font-family:var(--font-mono); font-size:13px; color:var(--ink-soft);}
.quiz-score b{color:var(--ember-deep); font-size:16px;}

/* numeric self-check input */
.num-solve{margin:14px 0 18px; padding-bottom:16px; border-bottom:1px dashed var(--paper-line);}
.num-solve:last-of-type{border-bottom:none;}
.num-q{display:flex; gap:9px; font-size:13.7px; line-height:1.58; margin-bottom:10px;}
.num-q .tag{flex:none; font-family:var(--font-mono); font-weight:700; color:var(--ember-deep);}
.num-input-row{display:flex; align-items:center; gap:9px; flex-wrap:wrap;}
.num-input-row .pretext{font-size:12.5px; color:var(--ink-soft); font-family:var(--font-mono);}
.num-input{
  font-family:var(--font-mono); font-size:14px; color:var(--ink); width:120px;
  border:1.5px solid var(--paper-deeper); border-radius:var(--radius-s); background:#fffdf7; padding:8px 11px; outline:none; transition:border-color .15s;
}
.num-input:focus{border-color:var(--teal-bright); background:#fff;}
.num-unit{font-family:var(--font-mono); font-size:12.5px; color:var(--ink-soft);}
.num-check-btn{font-family:var(--font-mono); font-size:11.5px; padding:8px 14px; border-radius:999px; border:1.5px solid var(--teal-deep); background:var(--teal-deep); color:var(--cream-on-dark); cursor:pointer;}
.num-check-btn:hover{background:var(--teal-bright); border-color:var(--teal-bright);}
.num-feedback{display:none; margin-top:9px; font-size:12.3px; line-height:1.55; padding:9px 12px; border-radius:var(--radius-s); border-left:4px solid;}
.num-feedback.show{display:block; animation:fbIn .3s ease;}
.num-feedback.right{background:#E7F3EE; border-color:var(--teal-bright); color:var(--teal-deep);}
.num-feedback.wrong{background:#FBEBE4; border-color:var(--ember); color:var(--ember-deep);}
.num-feedback .reveal{display:block; margin-top:5px; font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft);}

/* ============ GLOSSARY ============ */
.gloss-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:0;}
.gloss-item{padding:12px 2px; border-bottom:1px solid var(--paper-line); display:grid; grid-template-columns:auto 1fr; gap:12px; align-items:start;}
.gloss-item:last-child{border-bottom:none;}
.gloss-term{font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--ember-deep); min-width:118px;}
.gloss-def{font-size:12.8px; line-height:1.58; color:var(--ink);}
@media (max-width:520px){.gloss-item{grid-template-columns:1fr; gap:3px;}}

/* ============ COMPLETION SUMMARY (Penutup) ============ */
.completion{
  background:var(--paper-deep); border:1.5px solid var(--paper-line); border-radius:var(--radius-l);
  padding:16px 20px; margin:4px auto 14px; max-width:420px; width:100%;
}
.completion-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.completion-top .ct-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal-deep); font-weight:600;}
.completion-top .ct-pct{font-family:var(--font-display); font-weight:700; font-size:22px; color:var(--ember-deep);}
.completion-bar{height:10px; border-radius:6px; background:var(--paper-deeper); overflow:hidden;}
.completion-bar > div{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--sun),var(--teal)); width:0; transition:width .6s ease;}
.completion-hint{font-size:12px; color:var(--ink-soft); margin-top:9px; text-align:left;}

/* ============ CONCEPT-CHECK CHIPS (interleaved mini quiz) ============ */
.self-tip{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10.5px;
  letter-spacing:.04em; text-transform:uppercase; color:var(--sun-deep); font-weight:600; margin:2px 0 10px;
}
.self-tip svg{width:14px; height:14px;}

/* ============ WORK-SIGN CHIPS (positive / zero / negative work) ============ */
.sign-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin:8px 0 6px;}
.sign-chip{border:1.5px solid var(--paper-deeper); border-radius:var(--radius-m); padding:11px 13px; background:#fff;}
.sign-chip .sc-top{display:flex; align-items:baseline; gap:7px; margin-bottom:5px;}
.sign-chip .sc-name{font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.sign-chip .sc-sym{font-family:var(--font-display); font-weight:700; font-size:15px; margin-left:auto;}
.sign-chip.pos{border-color:#9AD1B6;} .sign-chip.pos .sc-name,.sign-chip.pos .sc-sym{color:var(--teal-deep);}
.sign-chip.zero{border-color:var(--paper-line);} .sign-chip.zero .sc-name,.sign-chip.zero .sc-sym{color:var(--stone-deep);}
.sign-chip.neg{border-color:#E8A88C;} .sign-chip.neg .sc-name,.sign-chip.neg .sc-sym{color:var(--ember-deep);}
.sign-chip p{font-size:11.6px; line-height:1.5; color:var(--ink-soft); margin:0;}
@media (max-width:520px){.sign-grid{grid-template-columns:1fr;}}

/* two-column readout variant for the spring calculator */
.calc-readout.two{grid-template-columns:repeat(2,1fr);}

/* ============ CONSERVATION OF ENERGY SIMULATOR ============ */
.sim-stage{display:flex; gap:16px; align-items:flex-end; background:#2B2318; border-radius:var(--radius-m); padding:16px 16px 14px;}
.sim-track{position:relative; height:224px; width:66px; flex:none; border-radius:11px; overflow:hidden;
  background:linear-gradient(180deg,#22333d 0%, #33505c 52%, #6d5531 100%); box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);}
.sim-ground{position:absolute; left:0; right:0; bottom:0; height:16px; background:repeating-linear-gradient(45deg,#7c5e2f,#7c5e2f 4px,#674d26 4px,#674d26 8px);}
.sim-ball{position:absolute; left:50%; width:26px; height:26px; margin-left:-13px; border-radius:50%;
  background:radial-gradient(circle at 33% 30%, #F7C766, #B8441A 78%); box-shadow:0 3px 9px rgba(0,0,0,.45); transition:bottom .1s linear; z-index:2;}
.sim-ball::after{content:''; position:absolute; left:33%; top:30%; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:rgba(255,255,255,.6);}
.sim-bars{flex:1; height:224px; display:flex; gap:16px; align-items:flex-end; justify-content:space-around;}
.sim-barcol{flex:1; max-width:84px; height:100%; display:flex; flex-direction:column; align-items:center;}
.sim-bar{position:relative; width:100%; flex:1; min-height:0; background:rgba(255,255,255,.08); border-radius:9px 9px 4px 4px; overflow:hidden; display:flex; align-items:flex-end;}
.sim-bar > i{display:block; width:100%; height:0; transition:height .1s linear;}
.sim-bar.ek > i{background:linear-gradient(180deg,var(--ember-bright),var(--ember));}
.sim-bar.ep > i{background:linear-gradient(180deg,var(--teal-bright),var(--teal));}
.sim-barcol .sb-cap{font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--sun-bright); margin-top:8px;}
.sim-barcol .sb-val{font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--cream-on-dark); margin-top:1px; line-height:1;}
.sim-barcol .sb-val small{font-family:var(--font-mono); font-weight:400; font-size:8.5px; color:#B9A986;}
.sim-readrow{display:grid; grid-template-columns:repeat(2,1fr); gap:11px; margin-top:12px;}
.sim-vcard{border-radius:0 var(--radius-s) var(--radius-s) 0; padding:10px 14px; background:#EAF3EF; border-left:4px solid var(--sun);}
.sim-vcard .vc-label{font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--sun-deep); display:flex; align-items:center; gap:5px;}
.sim-vcard .vc-label svg{width:13px; height:13px; flex:none;}
.sim-vcard .vc-val{font-family:var(--font-display); font-weight:700; font-size:20px; color:var(--sun-deep); margin-top:2px; line-height:1.05;}
.sim-vcard.vteal{border-left-color:var(--teal-bright); background:#E7F3EE;}
.sim-vcard.vteal .vc-label,.sim-vcard.vteal .vc-val{color:var(--teal-deep);}
@media (max-width:520px){
  .sim-stage{gap:11px; padding:12px;}
  .sim-track{width:52px;}
  .sim-bars{gap:10px;}
}

/* ============ PRINT SHEET ============ */
.print-sheet{display:none;}
@media print{
  body{background:#fff !important;}
  .desk-texture,.topbar,.stage,.save-toast,.toc-overlay{display:none !important;}
  .print-sheet{display:block !important; max-width:720px; margin:0 auto; font-family:var(--font-body); color:#000;}
  .print-sheet h1{font-family:var(--font-display); font-size:22px; margin-bottom:4px;}
  .print-sheet .p-meta{font-size:12px; color:#555; margin-bottom:20px;}
  .print-sheet h2{font-family:var(--font-mono); font-size:13px; text-transform:uppercase; letter-spacing:.06em; border-bottom:1.5px solid #000; padding-bottom:4px; margin:22px 0 10px;}
  .print-sheet .p-item{margin-bottom:11px; font-size:12.8px; page-break-inside:avoid;}
  .print-sheet .p-item .p-label{font-weight:700; display:block; margin-bottom:2px;}

  .print-sheet img{max-width:260px; border:1px solid #ccc; margin-top:4px;}
}

/* ============================================================
   STORAGE LAYER — memoryCache (sync, always works within session)
   + window.storage (async, best-effort cross-session persistence)
   ============================================================ */
const STORAGE_PREFIX = 'lkpd-energi-k5:';
const memoryCache = {};
const saveTimers = {};

function hasStorage(){
  return typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
}

async function loadField(id){
  if (Object.prototype.hasOwnProperty.call(memoryCache, id)) return memoryCache[id];
  if (!hasStorage()) return '';
  try{
    const res = await window.storage.get(STORAGE_PREFIX + id);
    if (res && typeof res.value === 'string'){
      memoryCache[id] = res.value;
      return res.value;
    }
  }catch(e){ /* key not found or storage unavailable — silent */ }
  return '';
}

function scheduleSave(id, value){
  memoryCache[id] = value;
  if (saveTimers[id]) clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(async () => {
    if (!hasStorage()) return;
    try{
      await window.storage.set(STORAGE_PREFIX + id, value);
      flashSaved();
    }catch(e){ /* best-effort only */ }
  }, 500);
}

let saveToastTimer = null;
function showToast(msg){
  const toast = document.getElementById('saveToast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(saveToastTimer);
  saveToastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}
function flashSaved(){ showToast('Tersimpan \u2713'); }

/* ============================================================
   PAGE HYDRATION — binds live DOM inputs to memoryCache/storage
   ============================================================ */
function hydratePage(root){
  // text inputs & textareas
  root.querySelectorAll('[data-field]').forEach(el => {
    const id = el.getAttribute('data-field');
    const apply = (val) => { if (typeof val === 'string' && val) el.value = val; };
    if (Object.prototype.hasOwnProperty.call(memoryCache, id)) apply(memoryCache[id]);
    else loadField(id).then(apply);
    el.addEventListener('input', () => scheduleSave(id, el.value));
  });

  // multiple choice groups
  const mcqGroups = new Set();
  root.querySelectorAll('[data-mcq-option]').forEach(btn => {
    const group = btn.closest('[data-mcq]');
    if (group) mcqGroups.add(group);
  });
  mcqGroups.forEach(group => {
    const qid = group.getAttribute('data-mcq');
    const applySelected = (letter) => {
      group.querySelectorAll('[data-mcq-option]').forEach(b => {
        b.classList.toggle('selected', b.getAttribute('data-mcq-option') === letter);
      });
    };
    if (Object.prototype.hasOwnProperty.call(memoryCache, qid)) applySelected(memoryCache[qid]);
    else loadField(qid).then(v => { if (v) applySelected(v); });
    group.querySelectorAll('[data-mcq-option]').forEach(btn => {
      btn.addEventListener('click', () => {
        const letter = btn.getAttribute('data-mcq-option');
        applySelected(letter);
        scheduleSave(qid, letter);
        clearMcqFeedback(group);   // allow changing answer, then re-checking
      });
    });
  });

  // numeric problems (instant tolerance-based check)
  root.querySelectorAll('[data-num]').forEach(block => {
    const btn = block.querySelector('[data-num-check]');
    const input = block.querySelector('[data-num-input]');
    if (btn) btn.addEventListener('click', () => checkNumeric(block));

      if (fb) fb.classList.remove('show');

  // interactive energy calculator
  const calc = root.querySelector('[data-calc]');
  if (calc) initEnergyCalc(calc);

  // spring / Hooke calculator
  const spring = root.querySelector('[data-spring]');
  if (spring) initSpringCalc(spring);

  // conservation-of-energy simulator
  const sim = root.querySelector('[data-sim]');
  if (sim) initConservationSim(sim);

  // completion summary (Penutup)
  const comp = root.querySelector('[data-completion]');
  if (comp) updateCompletion(comp);

  // drawing canvas
  const canvas = root.querySelector('[data-canvas]');
  if (canvas) initDrawingPad(canvas, root);
}

function clearMcqFeedback(group){
  group.querySelectorAll('[data-mcq-option]').forEach(b => b.classList.remove('correct','incorrect','locked','dimmed'));
  const fb = group.querySelector('[data-mcq-feedback]');
  if (fb){ fb.classList.remove('show','right','wrong'); fb.innerHTML = ''; }
}

function checkQuizPage(root){
  const groups = root.querySelectorAll('[data-mcq]');
  let answered = 0, correct = 0, total = 0;
  groups.forEach(group => {
    const qid = group.getAttribute('data-mcq');
    const key = ANSWER_KEY[qid];
    if (!key) return;
    total++;
    const chosen = memoryCache[qid];
    const opts = group.querySelectorAll('[data-mcq-option]');
    opts.forEach(b => {
      b.classList.remove('correct','incorrect','dimmed');
      b.classList.add('locked');
      const L = b.getAttribute('data-mcq-option');
      if (L === key.letter) b.classList.add('correct');
      else if (L === chosen) b.classList.add('incorrect');
      else b.classList.add('dimmed');
    });
    const fb = group.querySelector('[data-mcq-feedback]');
    if (fb){
      if (!chosen){
        fb.className = 'mcq-feedback show wrong';
        fb.innerHTML = `<span class="fb-verdict">Belum dijawab</span>Jawaban benar: <b>${key.letter}</b>. ${key.explain}`;
      } else if (chosen === key.letter){
        answered++; correct++;
        fb.className = 'mcq-feedback show right';
        fb.innerHTML = `<span class="fb-verdict">Benar ✓</span>${key.explain}`;
      } else {
        answered++;
        fb.className = 'mcq-feedback show wrong';
        fb.innerHTML = `<span class="fb-verdict">Belum tepat</span>Jawabanmu <b>${chosen}</b>. Jawaban benar: <b>${key.letter}</b>. ${key.explain}`;
      }
    }
  });
  const score = root.querySelector('[data-quiz-score]');
  if (score) score.innerHTML = `Skor: <b>${correct}</b>/${total} benar`;
  // remove the click-to-clear listeners' effect isn't needed; options stay interactive for retry
}

function clearQuizPage(root){
  root.querySelectorAll('[data-mcq]').forEach(group => clearMcqFeedback(group));
  const score = root.querySelector('[data-quiz-score]');
  if (score) score.innerHTML = '';
}

function checkNumeric(block){
  const input = block.querySelector('[data-num-input]');
  const fb = block.querySelector('[data-num-feedback]');
  if (!input || !fb) return;
  const raw = (input.value || '').replace(/\./g,'').replace(',', '.').replace(/[^0-9.\-]/g,'');
  const val = parseFloat(raw);
  const answer = parseFloat(block.getAttribute('data-answer'));
  const reveal = block.getAttribute('data-reveal') || '';
  if (isNaN(val)){
    fb.className = 'num-feedback show wrong';
    fb.innerHTML = 'Masukkan angka terlebih dahulu.';
    return;
  }
  const tol = Math.max(Math.abs(answer) * 0.02, 0.5); // 2% tolerance (or 0.5 min)
  if (Math.abs(val - answer) <= tol){
    fb.className = 'num-feedback show right';
    fb.innerHTML = `Tepat sekali! ✓ ${reveal ? `<span class="reveal">${reveal}</span>` : ''}`;
  } else {
    fb.className = 'num-feedback show wrong';
    fb.innerHTML = `Belum tepat — coba periksa kembali perhitunganmu. ${reveal ? `<span class="reveal">${reveal}</span>` : ''}`;
  }
}

/* Completion summary — counts filled fields across the whole LKPD */
async function updateCompletion(root){
  const results = await Promise.all(FIELD_REGISTRY.map(async f => {
    const v = Object.prototype.hasOwnProperty.call(memoryCache, f.id) ? memoryCache[f.id] : await loadField(f.id);
    return v != null && String(v).trim() !== '';
  }));
  const total = results.length;
  const done = results.filter(Boolean).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const pctEl = root.querySelector('[data-comp-pct]');
  const barEl = root.querySelector('[data-comp-bar]');
  const hintEl = root.querySelector('[data-comp-hint]');
  if (pctEl) pctEl.textContent = pct + '%';
  if (barEl) requestAnimationFrame(() => { barEl.style.width = pct + '%'; });
  if (hintEl){
    hintEl.textContent = done >= total
      ? 'Kerja bagus! Semua bagian sudah terisi. Kamu siap mencetak lembar jawaban.'
      : `Sudah terisi ${done} dari ${total} bagian. Lengkapi sisanya sebelum mencetak, atau cetak apa adanya.`;
  }
}

/* ============================================================
   DRAWING PAD — simple pointer-based sketch tool for Kegiatan 1
   ============================================================ */
function initDrawingPad(canvas, root){
  const ctx = canvas.getContext('2d');
  const id = canvas.getAttribute('data-canvas');
  let drawing = false;
  let last = null;
  let color = '#2A2118';
  let lineWidth = 4;
  const undoStack = [];

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x:(e.clientX - rect.left) * scaleX, y:(e.clientY - rect.top) * scaleY };
  }
  function pushUndo(){
    try{
      undoStack.push(canvas.toDataURL('image/png'));
      if (undoStack.length > 14) undoStack.shift();
    }catch(e){}
  }
  function persist(){ scheduleSave(id, canvas.toDataURL('image/png')); }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    drawing = true; pushUndo(); last = getPos(e);
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(last.x,last.y,lineWidth/2,0,Math.PI*2); ctx.fill();
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    last = pos;
  });
  const endStroke = () => { if (!drawing) return; drawing = false; persist(); };
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', () => { if (drawing) endStroke(); });

  root.querySelectorAll('[data-pen-color]').forEach(b => {
    b.addEventListener('click', () => {
      color = b.getAttribute('data-pen-color');
      root.querySelectorAll('[data-pen-color]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });
  root.querySelectorAll('[data-pen-width]').forEach(b => {
    b.addEventListener('click', () => {
      lineWidth = +b.getAttribute('data-pen-width');
      root.querySelectorAll('[data-pen-width]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });
  const clearBtn = root.querySelector('[data-canvas-clear]');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    pushUndo(); ctx.clearRect(0,0,canvas.width,canvas.height); persist();
  });
  const undoBtn = root.querySelector('[data-canvas-undo]');
  if (undoBtn) undoBtn.addEventListener('click', () => {
    if (!undoStack.length) return;
    const prev = undoStack.pop();
    const img = new Image();
    img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); persist(); };
    img.src = prev;
  });

  const restore = (val) => {
    if (!val) return;
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    img.src = val;
  };
  if (Object.prototype.hasOwnProperty.call(memoryCache, id)) restore(memoryCache[id]);
  else loadField(id).then(restore);
}

/* ============================================================
   INTERACTIVE ENERGY CALCULATOR — live Ek / Ep / Em explorer
   ============================================================ */
const CALC_PRESETS = [
  {label:'🥥 Kelapa di pohon', m:2,   v:0,  h:10},
  {label:'🏍️ Motor melaju',    m:100, v:15, h:0 },
  {label:'⚽ Bola melambung',   m:0.45,v:18, h:8 },
  {label:'💧 Air terjun /kg',   m:1,   v:4,  h:45},
];
const G = 10; // percepatan gravitasi (m/s²), standar soal SMA

function fmtJ(x){
  const n = Math.round(x);
  return n.toLocaleString('id-ID');
}
function initEnergyCalc(root){
  const mEl = root.querySelector('[data-calc-m]');
  const vEl = root.querySelector('[data-calc-v]');
  const hEl = root.querySelector('[data-calc-h]');
  const mOut = root.querySelector('[data-out-m]');
  const vOut = root.querySelector('[data-out-v]');
  const hOut = root.querySelector('[data-out-h]');
  const ekOut = root.querySelector('[data-out-ek]');
  const epOut = root.querySelector('[data-out-ep]');
  const emOut = root.querySelector('[data-out-em]');
  const ekCard = root.querySelector('[data-card-ek]');
  const epCard = root.querySelector('[data-card-ep]');
  const emCard = root.querySelector('[data-card-em]');
  const segEk = root.querySelector('[data-seg-ek]');
  const segEp = root.querySelector('[data-seg-ep]');

  let flashTimer = null;
  function flash(card){
    if (!card) return;
    card.classList.add('flash');
  }
  function update(fromSlider){
    const m = parseFloat(mEl.value);
    const v = parseFloat(vEl.value);
    const h = parseFloat(hEl.value);
    const ek = 0.5 * m * v * v;
    const ep = m * G * h;
    const em = ek + ep;
    mOut.textContent = m.toLocaleString('id-ID') + ' kg';
    vOut.textContent = v.toLocaleString('id-ID') + ' m/s';
    hOut.textContent = h.toLocaleString('id-ID') + ' m';
    ekOut.textContent = fmtJ(ek);
    epOut.textContent = fmtJ(ep);
    emOut.textContent = fmtJ(em);
    const ekPct = em > 0 ? (ek/em*100) : 0;
    const epPct = em > 0 ? (ep/em*100) : 0;
    segEk.style.width = ekPct + '%';
    segEp.style.width = epPct + '%';
    if (fromSlider){
      [ekCard, epCard, emCard].forEach(c => c && c.classList.add('flash'));
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => { [ekCard,epCard,emCard].forEach(c => c && c.classList.remove('flash')); }, 220);
    }
  }
  [mEl, vEl, hEl].forEach(el => el && el.addEventListener('input', () => update(true)));
  root.querySelectorAll('[data-preset]').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      const p = CALC_PRESETS[+btn.getAttribute('data-preset')];
      mEl.value = p.m; vEl.value = p.v; hEl.value = p.h;
      root.querySelectorAll('[data-preset]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      update(true);
    });
  });
  update(false);
}

/* Spring / Hooke's-law calculator: k, x → F = kx and Eₚ = ½kx² */
function initSpringCalc(root){
  const kEl = root.querySelector('[data-spring-k]');
  const xEl = root.querySelector('[data-spring-x]');
  const kOut = root.querySelector('[data-springout-k]');
  const xOut = root.querySelector('[data-springout-x]');
  const fOut = root.querySelector('[data-springout-f]');
  const epOut = root.querySelector('[data-springout-ep]');
  const fCard = root.querySelector('[data-springcard-f]');
  const epCard = root.querySelector('[data-springcard-ep]');
  let t = null;
  function update(fromSlider){
    const k = parseFloat(kEl.value);
    const x = parseFloat(xEl.value);
    const F = k * x;
    const Ep = 0.5 * k * x * x;
    kOut.textContent = k.toLocaleString('id-ID') + ' N/m';
    xOut.textContent = x.toLocaleString('id-ID', {maximumFractionDigits:2}) + ' m';
    fOut.textContent = F.toLocaleString('id-ID', {maximumFractionDigits:1});
    epOut.textContent = Ep.toLocaleString('id-ID', {maximumFractionDigits:2});
    if (fromSlider){
      [fCard, epCard].forEach(c => c && c.classList.add('flash'));
      clearTimeout(t); t = setTimeout(() => [fCard,epCard].forEach(c => c && c.classList.remove('flash')), 220);
    }
  }
  [kEl, xEl].forEach(el => el && el.addEventListener('input', () => update(true)));
  update(false);
}

/* Conservation-of-mechanical-energy simulator: drop a mass from height H and
   watch Eₚ convert to Eₖ while Eₘ stays constant. v = √(2g(H−h)). */
function initConservationSim(root){
  const Hel = root.querySelector('[data-sim-h0]');
  const mel = root.querySelector('[data-sim-m]');
  const hel = root.querySelector('[data-sim-h]');
  const HOut = root.querySelector('[data-simout-h0]');
  const mOut = root.querySelector('[data-simout-m]');
  const hOut = root.querySelector('[data-simout-h]');
  const ball = root.querySelector('[data-sim-ball]');
  const barEk = root.querySelector('[data-simbar-ek]');
  const barEp = root.querySelector('[data-simbar-ep]');
  const valEk = root.querySelector('[data-simval-ek]');
  const valEp = root.querySelector('[data-simval-ep]');
  const emVal = root.querySelector('[data-simval-em]');
  const vVal  = root.querySelector('[data-simval-v]');
  function update(){
    const H = parseFloat(Hel.value);
    const m = parseFloat(mel.value);
    hel.max = H;                       // current height can't exceed release height
    let h = parseFloat(hel.value);
    if (h > H){ h = H; hel.value = H; }
    const Em = m * G * H;
    const Ep = m * G * h;
    const Ek = Em - Ep;
    const v  = Math.sqrt(2 * G * (H - h));
    HOut.textContent = H.toLocaleString('id-ID') + ' m';
    mOut.textContent = m.toLocaleString('id-ID') + ' kg';
    hOut.textContent = h.toLocaleString('id-ID') + ' m';
    const frac = H > 0 ? h / H : 0;
    barEp.style.height = (frac * 100).toFixed(1) + '%';
    barEk.style.height = ((1 - frac) * 100).toFixed(1) + '%';
    if (ball) ball.style.bottom = `calc(16px + ${frac} * (100% - 42px))`;
    valEp.textContent = fmtJ(Ep);
    valEk.textContent = fmtJ(Ek);
    emVal.textContent = fmtJ(Em);
    vVal.textContent  = v.toLocaleString('id-ID', {maximumFractionDigits:1}) + ' m/s';
  }
  [Hel, mel, hel].forEach(el => el && el.addEventListener('input', update));
  update();
}

function renderC4(){
  const forms = [
    ['motion','Energi Kinetik','energi gerak'],
    ['geo','Energi Potensial','energi posisi / ketinggian'],
    ['flame','Energi Kalor','energi panas'],
    ['leaf','Energi Kimia','tersimpan dalam ikatan zat'],
    ['bolt','Energi Listrik','muatan yang bergerak'],
    ['atom','Energi Nuklir','tersimpan dalam inti atom'],
    ['sun','Energi Cahaya','radiasi gelombang'],
    ['chat','Energi Bunyi','getaran yang merambat'],
  ];
  return `
  <div>
    <span class="eyebrow">Bagian C &middot; Materi Ringkas</span>
    <h2 class="page-title">C.4 Bentuk Energi &amp; Rumus Dasar</h2>
    <p class="lead-text" style="font-size:13.5px; margin-bottom:14px;">Energi hadir dalam banyak bentuk dan dapat berpindah dari satu bentuk ke bentuk lain. Dua bentuk yang paling sering dihitung di kelas X adalah <b>energi kinetik</b> (karena gerak) dan <b>energi potensial</b> (karena ketinggian). Keduanya membentuk <b>energi mekanik</b>.</p>
    <div class="forms-grid">
      ${forms.map(f=>`<div class="form-chip"><span class="ico">${ICONS[f[0]]}</span><span><b>${f[1]}</b><span>${f[2]}</span></span></div>`).join('')}
    </div>
    <span class="eyebrow" style="margin-bottom:2px;">Rumus Penting</span>
    <div class="formula-stack">
      ${formulaCard('Energi Kinetik', 'E<sub>k</sub> = ½ · m · v<sup>2</sup>', [['Eₖ','energi kinetik (joule)'],['m','massa (kg)'],['v','kecepatan (m/s)']])}
      ${formulaCard('Energi Potensial', 'E<sub>p</sub> = m · g · h', [['Eₚ','energi potensial (joule)'],['m','massa (kg)'],['g','gravitasi ≈ 10 m/s²'],['h','ketinggian (m)']])}
      ${formulaCard('Energi Mekanik', 'E<sub>m</sub> = E<sub>k</sub> + E<sub>p</sub>', [['Eₘ','energi mekanik (joule)'],['Eₖ','energi kinetik'],['Eₚ','energi potensial']])}
      ${formulaCard('Daya', 'P = <span class="frac"><span class="top">W</span><span class="bot">t</span></span>', [['P','daya (watt)'],['W','usaha / energi (joule)'],['t','waktu (sekon)']])}
    </div>
    <div class="info-note"><span class="ico">${ICONS.info}</span><span>Satuan energi dalam SI adalah <b>joule (J)</b>. 1 joule = energi untuk memindahkan gaya 1 newton sejauh 1 meter. Satuan daya adalah <b>watt (W)</b>, yaitu 1 joule tiap sekon.</span></div>
    <div class="worked">
      <div class="worked-head">${ICONS.beaker}Contoh Soal — Kekekalan Energi</div>
      <div class="worked-body">
        <div class="prob">Sebutir kelapa bermassa <b>2 kg</b> tergantung <b>6 m</b> di atas tanah (g = 10 m/s²). Berapa energi potensialnya? Jika kelapa jatuh, berapa energi kinetiknya tepat saat menyentuh tanah? (anggap energi mekanik kekal)</div>
        <div class="worked-step"><span class="s-num">1</span><span>Energi potensial di atas: <span class="worked-math">Eₚ = m·g·h = 2 · 10 · 6 = 120 J</span></span></div>
        <div class="worked-step"><span class="s-num">2</span><span>Di titik tertinggi benda diam (v = 0), maka Eₖ = 0 sehingga energi mekanik <span class="worked-math">Eₘ = Eₖ + Eₚ = 0 + 120 = 120 J</span></span></div>
        <div class="worked-step"><span class="s-num">3</span><span>Energi mekanik kekal. Di tanah h = 0 maka Eₚ = 0, sehingga seluruh energi berubah menjadi kinetik: <span class="worked-math">Eₖ = Eₘ = 120 J</span></span></div>
        <div class="worked-answer"><b>Jawaban:</b> energi potensial awal = 120 J, dan energi kinetik saat menyentuh tanah = 120 J. Energinya tidak hilang — hanya berubah bentuk dari potensial menjadi kinetik.</div>
      </div>
    </div>
  </div>`;
}

function renderUsaha(){
  return `
  <div>
    <span class="eyebrow">Bagian C &middot; Materi Ringkas</span>
    <h2 class="page-title">C.5 Usaha &amp; Teorema Usaha&ndash;Energi</h2>
    <p class="lead-text" style="font-size:13.5px; margin-bottom:14px;">Dalam fisika, <b>usaha</b> (kerja) dilakukan ketika sebuah gaya menyebabkan benda berpindah. Berbeda dari makna sehari-hari, menahan beban berat tanpa berpindah tidak menghasilkan usaha sama sekali. Besar usaha bergantung pada gaya, jarak perpindahan, dan <b>arah</b> gaya terhadap perpindahan.</p>
    <span class="eyebrow" style="margin-bottom:2px;">Rumus Penting</span>
    <div class="formula-stack">
      ${formulaCard('Usaha oleh Gaya', 'W = F · s · cos θ', [['W','usaha (joule)'],['F','gaya (newton)'],['s','perpindahan (m)'],['θ','sudut gaya terhadap perpindahan']])}
      ${formulaCard('Teorema Usaha–Energi', 'W<sub>total</sub> = ΔE<sub>k</sub> = ½m·v₂<sup>2</sup> − ½m·v₁<sup>2</sup>', [['W','usaha total (joule)'],['ΔEₖ','perubahan energi kinetik'],['v₁','kecepatan awal (m/s)'],['v₂','kecepatan akhir (m/s)']])}
      ${formulaCard('Daya', 'P = <span class="frac"><span class="top">W</span><span class="bot">t</span></span> = F · v', [['P','daya (watt)'],['W','usaha (joule)'],['t','waktu (sekon)'],['v','kecepatan (m/s)']])}
    </div>
    <span class="eyebrow" style="margin:4px 0 2px;">Tanda Usaha Bergantung Arah Gaya</span>
    <div class="sign-grid">
      <div class="sign-chip pos"><div class="sc-top"><span class="sc-name">Positif</span><span class="sc-sym">θ &lt; 90°</span></div><p>Gaya searah perpindahan &mdash; energi kinetik bertambah. Contoh: mendorong meja hingga bergerak maju.</p></div>
      <div class="sign-chip zero"><div class="sc-top"><span class="sc-name">Nol</span><span class="sc-sym">θ = 90°</span></div><p>Gaya tegak lurus perpindahan. Contoh: menjinjing tas sambil berjalan mendatar &mdash; gaya angkat ⟂ gerak.</p></div>
      <div class="sign-chip neg"><div class="sc-top"><span class="sc-name">Negatif</span><span class="sc-sym">θ &gt; 90°</span></div><p>Gaya berlawanan arah gerak &mdash; energi kinetik berkurang. Contoh: gaya gesek yang memperlambat benda.</p></div>
    </div>
    <div class="info-note"><span class="ico">${ICONS.info}</span><span><b>Teorema usaha&ndash;energi</b> menghubungkan gaya dengan gerak: usaha total dari seluruh gaya yang bekerja pada benda sama dengan perubahan energi kinetiknya. Inilah sebabnya mengerem (gaya gesek melakukan usaha negatif) menurunkan kecepatan.</span></div>
    <div class="worked">
      <div class="worked-head">${ICONS.beaker}Contoh Soal — Usaha dengan Sudut</div>
      <div class="worked-body">
        <div class="prob">Sebuah peti ditarik dengan gaya <b>100 N</b> yang membentuk sudut <b>60&deg;</b> terhadap arah perpindahan. Peti berpindah sejauh <b>5 m</b>. Berapa usaha yang dilakukan gaya itu? (cos 60&deg; = 0,5)</div>
        <div class="worked-step"><span class="s-num">1</span><span>Tulis rumus usaha: <span class="worked-math">W = F · s · cos θ</span></span></div>
        <div class="worked-step"><span class="s-num">2</span><span>Masukkan nilai: <span class="worked-math">W = 100 · 5 · cos 60° = 100 · 5 · 0,5</span></span></div>
        <div class="worked-answer"><b>Jawaban:</b> W = 250 joule. Hanya komponen gaya yang searah perpindahan (F·cos θ) yang melakukan usaha.</div>
      </div>
    </div>
    <div class="worked">
      <div class="worked-head">${ICONS.scale}Contoh Soal — Teorema Usaha–Energi</div>
      <div class="worked-body">
        <div class="prob">Sebuah mobil bermassa <b>800 kg</b> dipercepat dari <b>10 m/s</b> menjadi <b>20 m/s</b>. Berapa usaha total yang dilakukan pada mobil?</div>
        <div class="worked-step"><span class="s-num">1</span><span>Gunakan teorema usaha&ndash;energi: <span class="worked-math">W = ½m(v₂² − v₁²)</span></span></div>
        <div class="worked-step"><span class="s-num">2</span><span>Masukkan nilai: <span class="worked-math">W = ½ · 800 · (20² − 10²) = 400 · (400 − 100)</span></span></div>
        <div class="worked-answer"><b>Jawaban:</b> W = 400 · 300 = 120.000 joule = 120 kJ. Usaha inilah yang menambah energi kinetik mobil.</div>
      </div>
    </div>
  </div>`;
}

function renderKekekalan(){
  return `
  <div>
    <span class="eyebrow">Bagian C &middot; Materi Ringkas</span>
    <h2 class="page-title">C.7 Hukum Kekekalan Energi Mekanik</h2>
    <p class="lead-text" style="font-size:13.5px; margin-bottom:14px;">Jika sebuah benda hanya dipengaruhi <b>gaya konservatif</b> (seperti gravitasi atau pegas) &mdash; tanpa gesekan atau hambatan udara &mdash; maka <b>energi mekanik totalnya tetap</b>. Energi potensial dapat berubah menjadi energi kinetik dan sebaliknya, tetapi jumlahnya selalu sama.</p>
    <span class="eyebrow" style="margin-bottom:2px;">Rumus Penting</span>
    <div class="formula-stack">
      ${formulaCard('Kekekalan Energi Mekanik', 'E<sub>m1</sub> = E<sub>m2</sub> &nbsp;→&nbsp; ½m·v₁<sup>2</sup> + m·g·h₁ = ½m·v₂<sup>2</sup> + m·g·h₂', [['Eₘ','energi mekanik (joule)'],['v','kecepatan (m/s)'],['h','ketinggian (m)'],['g','gravitasi ≈ 10 m/s²']])}
    </div>
    <div class="sign-grid" style="grid-template-columns:1fr 1fr;">
      <div class="sign-chip pos"><div class="sc-top"><span class="sc-name">Gaya Konservatif</span></div><p>Gravitasi &amp; pegas. Usaha tidak bergantung lintasan; energi mekanik <b>kekal</b>.</p></div>
      <div class="sign-chip neg"><div class="sc-top"><span class="sc-name">Non-Konservatif</span></div><p>Gesekan &amp; hambatan udara. Sebagian energi mekanik berubah menjadi <b>kalor</b>.</p></div>
    </div>
    <div class="info-note"><span class="ico">${ICONS.info}</span><span>Pada kasus nyata dengan gesekan, energi tetap kekal secara keseluruhan, tetapi sebagian energi mekanik &ldquo;hilang&rdquo; menjadi panas: <b>Eₘ₁ = Eₘ₂ + energi yang menjadi kalor</b>.</span></div>
    <div class="worked">
      <div class="worked-head">${ICONS.beaker}Contoh Soal — Kecepatan Jatuh</div>
      <div class="worked-body">
        <div class="prob">Sebuah mangga bermassa <b>0,3 kg</b> jatuh bebas dari ketinggian <b>20 m</b> (g = 10 m/s², hambatan udara diabaikan). Berapa kecepatannya tepat sebelum menyentuh tanah?</div>
        <div class="worked-step"><span class="s-num">1</span><span>Di atas benda diam (Eₖ = 0), di tanah h = 0 (Eₚ = 0). Kekekalan energi: <span class="worked-math">m·g·h = ½m·v²</span></span></div>
        <div class="worked-step"><span class="s-num">2</span><span>Massa saling meniadakan, sehingga <span class="worked-math">v = √(2·g·h) = √(2 · 10 · 20) = √400</span></span></div>
        <div class="worked-answer"><b>Jawaban:</b> v = 20 m/s. Perhatikan bahwa massa <b>tidak</b> memengaruhi kecepatan jatuh &mdash; benda berat dan ringan tiba bersamaan bila hambatan udara diabaikan.</div>
      </div>
    </div>
    <p class="lead-text" style="font-size:12.5px; color:var(--ink-soft); margin-top:14px;">Ingin melihatnya bergerak? Buka <b>Lab Mini &middot; Simulasi Kekekalan Energi</b> pada halaman berikutnya untuk mengamati perubahan Eₖ dan Eₚ secara langsung.</p>
  </div>`;
}
