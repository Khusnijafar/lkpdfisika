<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Energi dalam Kehidupan — LKPD Interaktif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,600&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ RESET & TOKENS ============ */
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
:root{
  --paper:#FBF4E3;
  --paper-deep:#F1E3C2;
  --paper-deeper:#E9D8AE;
  --paper-line:#DEC998;
  --ink:#2A2118;
  --ink-soft:#69594420;
  --ink-soft:#6B5D48;
  --ink-faint:#9C8D74;
  --sun:#E2941F;
  --sun-deep:#A0620E;
  --sun-bright:#F4B23D;
  --teal:#146B70;
  --teal-deep:#0D4F53;
  --teal-bright:#1E8B8F;
  --ember:#B8441A;
  --ember-deep:#8F3513;
  --ember-bright:#D65A2A;
  --stone:#8B8272;
  --stone-deep:#5B5446;
  --cream-on-dark:#F6EAD0;
  --shadow-color:20,12,5;
  --radius-s:6px;
  --radius-m:12px;
  --radius-l:20px;
  --font-display:'Fraunces',serif;
  --font-body:'Source Sans 3',-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
body{
  font-family:var(--font-body);
  color:var(--ink);
  min-height:100vh;
  background-color:#E7D5A6;
  background-image:
    radial-gradient(1100px 700px at 50% -8%, #FFFAEE 0%, #F6E6C0 42%, #E7D5A6 100%);
  overflow-x:hidden;
}
.desk-texture{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:radial-gradient(circle, rgba(42,33,24,.07) 1px, transparent 1.5px);
  background-size:24px 24px;
  opacity:.6;
}
h1,h2,h3,h4{font-family:var(--font-display); margin:0; color:var(--ink); font-weight:700;}
p{margin:0 0 .75em; line-height:1.65;}
button{font-family:inherit;}
::selection{background:var(--sun); color:var(--ink);}

/* scrollbar styling for page faces */
.face::-webkit-scrollbar{width:9px;}
.face::-webkit-scrollbar-track{background:transparent;}
.face::-webkit-scrollbar-thumb{background:var(--paper-deeper); border-radius:10px;}
.face::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);}

/* focus visibility */
a:focus-visible,button:focus-visible,textarea:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--teal-bright); outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ============ APP LAYOUT ============ */
.app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:14px 14px 28px;}

.topbar{
  width:100%; max-width:980px;
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 4px 16px;
  gap:10px;
}
.brand{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.06em;
  color:var(--ink-soft); text-transform:uppercase; text-align:center;
  flex:1;
}
.brand strong{color:var(--ember-deep);}
.chip-btn{
  display:inline-flex; align-items:center; gap:7px;
  background:var(--paper); border:1.5px solid var(--paper-line);
  color:var(--ink); font-family:var(--font-mono); font-size:12.5px; font-weight:500;
  padding:8px 14px; border-radius:999px; cursor:pointer;
  box-shadow:0 2px 6px rgba(var(--shadow-color),.12);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  white-space:nowrap;
}
.chip-btn:hover{transform:translateY(-1px); box-shadow:0 5px 12px rgba(var(--shadow-color),.18); background:#fff9ea;}
.chip-btn:active{transform:translateY(0);}
.chip-btn .ico{width:15px; height:15px; flex:none;}

.stage{width:100%; display:flex; justify-content:center; flex:1;}

/* ============ BOOK FRAME ============ */
.book{
  position:relative;
  width:min(760px, 94vw);
  height:min(900px, 84vh);
  margin:0 auto;
}
.spine{
  position:absolute; left:-16px; top:8px; bottom:8px; width:30px; z-index:3;
  background:linear-gradient(180deg,#3a2f22,#1c1712 60%,#140f0b);
  border-radius:12px 3px 3px 12px;
  box-shadow:inset -5px 0 10px rgba(0,0,0,.45), -4px 4px 14px rgba(var(--shadow-color),.35);
  display:flex; align-items:center; justify-content:center;
}
.spine-title{
  writing-mode:vertical-rl; transform:rotate(180deg);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.22em;
  color:var(--sun); text-transform:uppercase; white-space:nowrap; opacity:.92;
}
.page-edges{
  position:absolute; right:-5px; top:10px; bottom:10px; width:9px; z-index:1;
  background:repeating-linear-gradient(180deg,#EFE2C2 0 2px,#DFCB9E 2px 3px);
  border-radius:0 7px 7px 0;
  box-shadow:2px 0 5px rgba(0,0,0,.18) inset, 3px 2px 6px rgba(var(--shadow-color),.2);
}
.book-inner{
  position:relative; z-index:2; height:100%;
  background:var(--paper);
  border-radius:5px 16px 16px 5px;
  box-shadow:0 34px 64px -22px rgba(var(--shadow-color),.5), 0 14px 30px -14px rgba(var(--shadow-color),.35);
  display:flex; flex-direction:column;
  padding:0 3px;
  overflow:hidden;
}
.book-header{
  flex:none; padding:16px 26px 10px; display:flex; flex-direction:column; gap:8px;
  border-bottom:1px solid var(--paper-line);
}
.running-head{
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--teal-deep); font-weight:500;
}
.progress-track{height:4px; border-radius:4px; background:var(--paper-deeper); overflow:hidden;}
.progress-fill{height:100%; width:5%; border-radius:4px; background:linear-gradient(90deg,var(--sun),var(--teal)); transition:width .5s ease;}

.flip-stage{position:relative; flex:1; min-height:0; perspective:2600px; margin:0 6px;}
.flipper{
  position:absolute; inset:0;
  transform-style:preserve-3d;
  transform:rotateY(0deg);
  transform-origin:0% 50%;
  transition:transform .68s cubic-bezier(.61,.04,.36,1);
  filter:drop-shadow(-8px 10px 20px rgba(var(--shadow-color),.28));
}
.flipper.no-anim{transition:none;}
.flipper.flip-next{transform:rotateY(-179.9deg);}
.flipper.flip-prev{transform:rotateY(179.9deg);}
.face{
  position:absolute; inset:0;
  background:var(--paper);
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow-y:auto; overflow-x:hidden;
  padding:20px 26px 26px;
}
.face-back{transform:rotateY(180deg); pointer-events:none;}

.book-footer{
  flex:none; padding:10px 26px 16px; display:flex; align-items:center; justify-content:center; gap:18px;
}
.nav-btn{
  width:38px; height:38px; border-radius:50%; border:1.5px solid var(--paper-line);
  background:var(--paper); color:var(--ink); font-size:19px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 6px rgba(var(--shadow-color),.14);
  transition:transform .15s ease, background .15s ease, opacity .15s ease;
}
.nav-btn:hover:not(:disabled){transform:translateY(-2px); background:#fff8e8;}
.nav-btn:disabled{opacity:.3; cursor:not-allowed;}
.page-indicator{font-family:var(--font-mono); font-size:12.5px; color:var(--ink-soft); min-width:64px; text-align:center;}

@media (max-width:640px){
  .book{width:100vw; height:calc(100vh - 118px); margin:0;}
  .spine{left:-10px; width:20px;}
  .spine-title{font-size:9px;}
  .page-edges{right:-3px; width:6px;}
  .book-inner{border-radius:3px 10px 10px 3px;}
  .face{padding:16px 16px 20px;}
  .book-header{padding:12px 16px 8px;}
  .book-footer{padding:8px 16px 12px;}
}

/* ============ TOC DRAWER ============ */
.toc-overlay{
  position:fixed; inset:0; z-index:50; display:none;
  background:rgba(20,15,10,.45); backdrop-filter:blur(2px);
}
.toc-overlay.open{display:block;}
.toc-panel{
  position:absolute; left:0; top:0; bottom:0; width:min(340px,88vw);
  background:var(--paper); box-shadow:12px 0 40px rgba(0,0,0,.35);
  display:flex; flex-direction:column;
  transform:translateX(-100%); transition:transform .35s cubic-bezier(.2,.8,.3,1);
}
.toc-overlay.open .toc-panel{transform:translateX(0);}
.toc-panel-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px; border-bottom:1px solid var(--paper-line);
  font-family:var(--font-display); font-weight:700; font-size:19px;
}
.toc-panel-head button{
  width:32px; height:32px; border-radius:50%; border:none; background:var(--paper-deep);
  cursor:pointer; font-size:15px; color:var(--ink-soft);
}
.toc-list{flex:1; overflow-y:auto; padding:8px 0;}
.toc-item{
  display:flex; align-items:baseline; gap:10px; width:100%; text-align:left;
  background:none; border:none; cursor:pointer; padding:9px 20px;
  font-family:var(--font-body); font-size:14.5px; color:var(--ink);
  border-left:3px solid transparent;
}
.toc-item:hover{background:var(--paper-deep);}
.toc-item.active{border-left-color:var(--ember); background:var(--paper-deep); font-weight:600;}
.toc-item .num{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); min-width:20px;}
.toc-item.section-label{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--teal-deep); font-weight:600; padding:14px 20px 5px; cursor:default; pointer-events:none;
}
.toc-panel-foot{padding:14px 20px 20px; border-top:1px solid var(--paper-line);}
.toc-reset{
  width:100%; padding:10px; border-radius:10px; border:1.5px solid var(--ember);
  background:none; color:var(--ember-deep); font-weight:600; font-size:13px; cursor:pointer;
}
.toc-reset:hover{background:#fbe9df;}

/* ============ SAVE TOAST ============ */
.save-toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--teal-deep); color:#fff; font-family:var(--font-mono); font-size:12.5px;
  padding:9px 18px; border-radius:999px; box-shadow:0 8px 20px rgba(0,0,0,.25);
  opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease; z-index:60;
}
.save-toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ============ CONTENT TYPOGRAPHY ============ */
.eyebrow{
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ember-deep); font-weight:600; margin-bottom:6px; display:block;
}
.page-title{font-size:clamp(21px,4.4vw,28px); line-height:1.18; margin-bottom:4px;}
.page-sub{font-family:var(--font-body); color:var(--ink-soft); font-size:14.5px; margin-bottom:18px;}
.section-block{margin-bottom:22px;}
.section-block:last-child{margin-bottom:4px;}
.lead-text{font-size:15.5px; line-height:1.72; color:var(--ink);}
.hairline{border:none; border-top:1px dashed var(--paper-line); margin:18px 0;}

/* ============ COVER PAGE ============ */
.cover{height:100%; display:flex; flex-direction:column;}
.cover-uni{
  text-align:center; font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
  color:var(--teal-deep); text-transform:uppercase; padding-top:2px;
}
.cover-uni b{display:block; font-size:12.5px; color:var(--ink); letter-spacing:.06em; margin-top:2px;}
.cover-emblem{display:flex; justify-content:center; margin:14px 0 6px;}
.cover-emblem svg{width:clamp(110px,22vw,150px); height:auto;}
.cover-titles{text-align:center; margin:6px 0 16px;}
.cover-kind{font-family:var(--font-mono); font-size:11.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ember-deep); margin-bottom:8px;}
.cover-title{font-size:clamp(26px,6.2vw,38px); line-height:1.06; font-weight:900;}
.cover-title em{font-style:italic; color:var(--teal-deep);}
.cover-subtitle{font-family:var(--font-body); font-style:italic; color:var(--ink-soft); font-size:14.5px; margin-top:9px;}
.cover-badges{display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin:16px 0;}
.badge{
  font-family:var(--font-mono); font-size:11.5px; padding:6px 12px; border-radius:999px;
  border:1px solid var(--paper-line); color:var(--teal-deep); background:var(--paper-deep);
}
.cover-group{
  background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:var(--radius-m);
  padding:14px 18px; margin:8px auto 0; max-width:420px; width:100%;
}
.cover-group-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:8px; text-align:center;}
.people-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px;}
.people-list li{display:flex; justify-content:space-between; font-size:13.5px; gap:10px; border-bottom:1px dotted var(--paper-line); padding-bottom:4px;}
.people-list li:last-child{border-bottom:none; padding-bottom:0;}
.people-list .npm{font-family:var(--font-mono); color:var(--ink-faint); font-size:12px; white-space:nowrap;}
.cover-spacer{flex:1;}
.cover-cta{
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:var(--ember); color:#fff8ec; border:none; border-radius:999px;
  font-family:var(--font-body); font-weight:700; font-size:15px; letter-spacing:.02em;
  padding:13px 26px; margin:18px auto 6px; cursor:pointer; width:fit-content;
  box-shadow:0 10px 22px -8px rgba(184,68,26,.55);
  transition:transform .15s ease, box-shadow .15s ease;
}
.cover-cta:hover{transform:translateY(-2px); box-shadow:0 14px 26px -8px rgba(184,68,26,.6);}
.cover-foot{text-align:center; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); padding-bottom:2px;}

/* ============ IDENTITY + TOC-IN-PAGE ============ */
.field-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; margin-bottom:8px;}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--teal-deep); font-weight:600;}
.field input{
  font-family:var(--font-body); font-size:15px; color:var(--ink);
  border:none; border-bottom:1.5px solid var(--paper-deeper); background:transparent;
  padding:5px 2px 8px; outline:none; transition:border-color .15s;
}
.field input:focus{border-color:var(--ember);}
.field input::placeholder{color:var(--ink-faint); font-style:italic;}

.mini-toc{list-style:none; margin:6px 0 0; padding:0; display:flex; flex-direction:column; gap:1px;}
.mini-toc-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:none; border:none; border-bottom:1px solid var(--paper-line);
  padding:9px 4px; cursor:pointer; font-family:var(--font-body); font-size:14px; color:var(--ink);
}
.mini-toc-item:hover{color:var(--ember-deep);}
.mini-toc-item .letter{
  font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--sun-deep); min-width:22px;
}
.mini-toc-item .dots{flex:1; border-bottom:1px dotted var(--paper-deeper); margin:0 4px; height:0;}
.mini-toc-item .pg{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint);}

/* ============ KD / TUJUAN LISTS ============ */
.goal-card{
  background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:var(--radius-m);
  padding:16px 18px; margin-bottom:14px;
}
.goal-card h3{font-size:14px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.08em; color:var(--teal-deep); margin-bottom:11px; font-weight:600;}
.num-list{list-style:none; margin:0; padding:0; counter-reset:num;}
.num-list li{
  counter-increment:num; display:flex; gap:11px; font-size:14.5px; line-height:1.55;
  margin-bottom:10px; align-items:flex-start;
}
.num-list li:last-child{margin-bottom:0;}
.num-list li::before{
  content:counter(num); flex:none; width:23px; height:23px; border-radius:50%;
  background:var(--sun); color:#3a2405; font-family:var(--font-mono); font-weight:700; font-size:12px;
  display:flex; align-items:center; justify-content:center; margin-top:1px;
}

/* ============ INSTRUCTION LIST (B) ============ */
.instr-callout{
  border:1.5px solid var(--paper-line); border-radius:var(--radius-m); padding:16px 18px 6px;
  background:linear-gradient(180deg,#fffdf6,var(--paper-deep));
}
.instr-callout > p:first-child{font-weight:600; font-size:14.5px; margin-bottom:12px;}
.instr-list{list-style:none; margin:0; padding:0;}
.instr-list li{display:flex; gap:12px; font-size:14px; line-height:1.55; margin-bottom:13px; align-items:flex-start;}
.instr-list .ico{flex:none; width:26px; height:26px; color:var(--teal-deep); margin-top:1px;}
.instr-list .ico svg{width:100%; height:100%;}

/* ============ FLOW DIAGRAM (C.1) ============ */
.law-box{
  background:var(--paper-deep); border-left:4px solid var(--ember); border-radius:0 var(--radius-s) var(--radius-s) 0;
  padding:13px 16px; font-size:14.5px; line-height:1.6; margin-bottom:20px;
}
.flow-wrap{display:flex; flex-direction:column; align-items:stretch; gap:0; margin-bottom:8px;}
.flow-step{
  display:flex; align-items:center; gap:12px; background:var(--paper-deep);
  border:1px solid var(--paper-line); border-radius:var(--radius-m); padding:11px 14px;
}
.flow-step .ico{
  flex:none; width:38px; height:38px; border-radius:50%; background:var(--paper);
  display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(var(--shadow-color),.15);
}
.flow-step .ico svg{width:22px; height:22px;}
.flow-step .txt b{display:block; font-size:13.5px; font-weight:700;}
.flow-step .txt span{font-size:12px; color:var(--ink-soft);}
.flow-arrow{display:flex; justify-content:center; padding:3px 0;}
.flow-arrow svg{width:16px; height:22px; color:var(--ink-faint);}
.flow-branch{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:2px;}
.flow-branch .flow-step{flex-direction:column; text-align:center; gap:6px; padding:12px 8px;}

/* ============ FOOD-CHAIN ILLUSTRATION (Kegiatan 1) ============ */
.foodchain{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:8px; justify-content:center;}
.fc-node{
  display:flex; flex-direction:column; align-items:center; gap:2px; text-align:center;
  background:var(--paper-deep); border:1.5px solid var(--paper-line); border-radius:var(--radius-s);
  padding:9px 11px; min-width:76px;
}
.fc-node.fc-decomposer{background:#F1ECE2; border-color:var(--stone);}
.fc-tier{font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--teal-deep); font-weight:600;}
.fc-name{font-family:var(--font-display); font-weight:700; font-size:13.5px;}
.fc-arrow{flex:none; color:var(--ink-faint); font-size:15px;}
.fc-loop-note{font-size:12px; font-style:italic; color:var(--ink-soft); text-align:center; margin:6px 0 18px;}

/* ============ COMPARE GRID (C.2) ============ */
.compare-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.compare-card{border-radius:var(--radius-m); padding:15px 15px 16px; border:1.5px solid;}
.compare-card.tak{background:#F1ECE2; border-color:var(--stone);}
.compare-card.bar{background:#FDF3E1; border-color:var(--sun);}
.compare-card h4{font-size:13.5px; margin-bottom:9px; display:flex; align-items:center; gap:7px;}
.compare-card.tak h4{color:var(--stone-deep);}
.compare-card.bar h4{color:var(--sun-deep);}
.compare-card h4 svg{width:17px; height:17px;}
.compare-card ul{margin:0 0 10px; padding-left:18px; font-size:13px; line-height:1.6;}
.compare-card .ciri{font-size:11.5px; line-height:1.55; font-style:italic; color:var(--ink-soft); border-top:1px dashed rgba(0,0,0,.15); padding-top:8px;}
@media (max-width:520px){.compare-grid{grid-template-columns:1fr;}}

/* ============ ENERGY TYPE CARDS (C.3) ============ */
.energy-cards{display:flex; flex-direction:column; gap:10px;}
.energy-card{
  display:grid; grid-template-columns:40px 1fr; gap:12px;
  background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:var(--radius-m); padding:12px 14px;
}
.energy-card .ico{width:40px; height:40px; border-radius:10px; background:var(--paper); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(var(--shadow-color),.13);}
.energy-card .ico svg{width:24px; height:24px; color:var(--teal-deep);}
.energy-card h4{font-size:13.5px; margin-bottom:3px;}
.energy-card p{font-size:12.5px; line-height:1.5; margin:0 0 4px; color:var(--ink);}
.energy-card .contoh{font-size:11.5px; color:var(--teal-deep); font-weight:600;}

/* ============ CASE STUDY BOX ============ */
.case-box{
  background:#FFF7E4; border:1.5px solid var(--sun); border-radius:var(--radius-m);
  padding:15px 17px; margin-bottom:18px; position:relative;
}
.case-box-tag{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10.5px;
  letter-spacing:.08em; text-transform:uppercase; color:var(--ember-deep); font-weight:700; margin-bottom:9px;
}
.case-box-tag svg{width:14px; height:14px;}
.case-box p{font-size:13.5px; line-height:1.62; margin-bottom:10px;}
.case-box p:last-child{margin-bottom:0;}

/* ============ Q&A BLOCK ============ */
.qa{margin-bottom:16px;}
.qa:last-child{margin-bottom:4px;}
.qa-q{display:flex; gap:9px; font-size:14px; line-height:1.55; margin-bottom:8px;}
.qa-q .tag{flex:none; font-family:var(--font-mono); font-weight:700; color:var(--ember-deep); font-size:13px;}
.qa textarea, .fill-table textarea, .reflect-cell textarea{
  width:100%; font-family:var(--font-body); font-size:13.7px; line-height:1.55; color:var(--ink);
  background:#fffdf7; border:1.5px solid var(--paper-deeper); border-radius:var(--radius-s);
  padding:9px 11px; resize:vertical; outline:none; transition:border-color .15s, background .15s;
}
.qa textarea{min-height:64px;}
.qa textarea:focus, .fill-table textarea:focus, .reflect-cell textarea:focus{border-color:var(--teal-bright); background:#fff;}
.qa textarea::placeholder, .fill-table textarea::placeholder, .reflect-cell textarea::placeholder{color:var(--ink-faint); font-style:italic;}

/* ============ FILL TABLE ============ */
.fill-table{width:100%; border-collapse:collapse; font-size:13px;}
.fill-table th{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
  color:var(--teal-deep); text-align:left; padding:6px 8px; border-bottom:2px solid var(--paper-deeper);
}
.fill-table td{padding:6px 7px; vertical-align:top; border-bottom:1px solid var(--paper-line);}
.fill-table td.label-cell{font-weight:600; font-size:13px; width:34%; padding-top:11px; color:var(--ink);}
.fill-table textarea{min-height:44px;}
.fill-table.two-col td.label-cell{width:32%;}

/* ============ MCQ ============ */
.mcq{margin-bottom:20px; border-bottom:1px dashed var(--paper-line); padding-bottom:16px;}
.mcq:last-child{border-bottom:none;}
.mcq-q{font-size:14px; line-height:1.55; margin-bottom:10px; display:flex; gap:8px;}
.mcq-q .tag{flex:none; font-family:var(--font-mono); font-weight:700; color:var(--ember-deep);}
.mcq-opts{display:flex; flex-direction:column; gap:7px;}
.mcq-opt{
  display:flex; align-items:center; gap:10px; text-align:left; width:100%;
  background:#fffdf7; border:1.5px solid var(--paper-deeper); border-radius:var(--radius-s);
  padding:8px 12px; cursor:pointer; font-size:13.3px; color:var(--ink); font-family:var(--font-body);
  transition:border-color .15s, background .15s;
}
.mcq-opt:hover{border-color:var(--teal-bright);}
.mcq-opt .letter{
  flex:none; width:21px; height:21px; border-radius:50%; border:1.5px solid var(--ink-faint);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; font-weight:600;
  color:var(--ink-soft);
}
.mcq-opt.selected{border-color:var(--ember); background:#FCEFE6;}
.mcq-opt.selected .letter{background:var(--ember); border-color:var(--ember); color:#fff;}

/* ============ DRAWING PAD ============ */
.pad-toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:9px; padding:8px 10px; background:var(--paper-deep); border-radius:var(--radius-s);}
.pad-group{display:flex; align-items:center; gap:5px;}
.pad-group .glabel{font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin-right:2px;}
.swatch{width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:0;}
.swatch.active{border-color:var(--ink);}
.pad-size{width:20px; height:20px; border-radius:50%; background:var(--ink); cursor:pointer; border:2px solid transparent; padding:0; display:flex; align-items:center; justify-content:center;}
.pad-size.active{border-color:var(--ember);}
.pad-btn{
  font-family:var(--font-mono); font-size:11px; padding:6px 11px; border-radius:7px; border:1px solid var(--paper-deeper);
  background:#fff; cursor:pointer; color:var(--ink-soft); display:flex; align-items:center; gap:5px;
}
.pad-btn:hover{background:var(--paper-deeper);}
.pad-btn svg{width:13px; height:13px;}
.pad-canvas-wrap{border:1.5px dashed var(--paper-deeper); border-radius:var(--radius-m); overflow:hidden; background:#fffefa; touch-action:none;}
.pad-canvas-wrap canvas{width:100%; height:auto; display:block; cursor:crosshair;}

/* ============ CHAPTER OPENER / DIVIDER ============ */
.divider-page{min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:12px; padding:20px 0;}
.divider-page .ico-big{width:60px; height:60px; color:var(--sun-deep);}
.divider-page .ico-big svg{width:100%; height:100%;}
.divider-kicker{font-family:var(--font-mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ember-deep); font-weight:700;}
.divider-page h2{font-size:clamp(21px,5vw,28px);}
.divider-page .lead-text{max-width:440px;}
.preview-list{list-style:none; margin:8px 0 0; padding:0; display:flex; flex-direction:column; gap:8px; text-align:left; max-width:380px; width:100%;}
.preview-list li{display:flex; gap:9px; font-size:13.5px; align-items:center; background:var(--paper-deep); border-radius:var(--radius-s); padding:9px 12px;}
.preview-list .n{font-family:var(--font-mono); font-weight:700; color:var(--sun-deep); font-size:13px;}

/* ============ REFLECTION GRID ============ */
.reflect-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.reflect-cell label{display:block; font-size:12.5px; font-weight:600; color:var(--teal-deep); margin-bottom:6px; line-height:1.35;}
.reflect-cell textarea{min-height:90px;}
@media (max-width:520px){.reflect-grid{grid-template-columns:1fr;}}

/* ============ BIBLIOGRAPHY ============ */
.biblio-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:13px;}
.biblio-list li{font-size:13.3px; line-height:1.6; padding-left:22px; text-indent:-22px;}
.biblio-list li i{font-style:italic;}

/* ============ BACK COVER ============ */
.backcover{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px;}
.backcover .ico-big{width:56px; height:56px; color:var(--teal-deep); margin-bottom:4px;}
.backcover .ico-big svg{width:100%; height:100%;}
.backcover h2{font-size:clamp(22px,5vw,29px);}
.backcover .lead-text{max-width:420px; margin-bottom:6px;}
.backcover .cover-cta{background:var(--teal-deep); box-shadow:0 10px 22px -8px rgba(13,79,83,.5);}
.backcover .cover-cta:hover{box-shadow:0 14px 26px -8px rgba(13,79,83,.55);}
.link-btn{background:none; border:none; color:var(--teal-deep); font-family:var(--font-mono); font-size:12.5px; text-decoration:underline; cursor:pointer; padding:6px;}

/* ============ PRINT SHEET ============ */
.print-sheet{display:none;}
@media print{
  body{background:#fff !important;}
  .desk-texture,.topbar,.stage,.save-toast,.toc-overlay{display:none !important;}
  .print-sheet{display:block !important; max-width:720px; margin:0 auto; font-family:var(--font-body); color:#000;}
  .print-sheet h1{font-family:var(--font-display); font-size:22px; margin-bottom:4px;}
  .print-sheet .p-meta{font-size:12px; color:#555; margin-bottom:20px;}
  .print-sheet h2{font-family:var(--font-mono); font-size:13px; text-transform:uppercase; letter-spacing:.06em; border-bottom:1.5px solid #000; padding-bottom:4px; margin:22px 0 10px;}
  .print-sheet .p-item{margin-bottom:11px; font-size:12.8px; page-break-inside:avoid;}
  .print-sheet .p-item .p-label{font-weight:700; display:block; margin-bottom:2px;}
  .print-sheet .p-item .p-val{white-space:pre-wrap; border-bottom:1px dotted #999; padding-bottom:4px; min-height:14px;}
  .print-sheet img{max-width:260px; border:1px solid #ccc; margin-top:4px;}
}

};
/* ============================================================
   STORAGE LAYER — memoryCache (sync, always works within session)
   + window.storage (async, best-effort cross-session persistence)
   ============================================================ */
const STORAGE_PREFIX = 'lkpd-energi-k5:';
const memoryCache = {};
const saveTimers = {};

function hasStorage(){
  return typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
}

async function loadField(id){
  if (Object.prototype.hasOwnProperty.call(memoryCache, id)) return memoryCache[id];
  if (!hasStorage()) return '';
  try{
    const res = await window.storage.get(STORAGE_PREFIX + id);
    if (res && typeof res.value === 'string'){
      memoryCache[id] = res.value;
      return res.value;
    }
  }catch(e){ /* key not found or storage unavailable — silent */ }
  return '';
}

function scheduleSave(id, value){
  memoryCache[id] = value;
  if (saveTimers[id]) clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(async () => {
    if (!hasStorage()) return;
    try{
      await window.storage.set(STORAGE_PREFIX + id, value);
      flashSaved();
    }catch(e){ /* best-effort only */ }
  }, 500);
}

let saveToastTimer = null;
function showToast(msg){
  const toast = document.getElementById('saveToast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(saveToastTimer);
  saveToastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}
function flashSaved(){ showToast('Tersimpan \u2713'); }

/* ============================================================
   PAGE HYDRATION — binds live DOM inputs to memoryCache/storage
   ============================================================ */
function hydratePage(root){
  // text inputs & textareas
  root.querySelectorAll('[data-field]').forEach(el => {
    const id = el.getAttribute('data-field');
    const apply = (val) => { if (typeof val === 'string' && val) el.value = val; };
    if (Object.prototype.hasOwnProperty.call(memoryCache, id)) apply(memoryCache[id]);
    else loadField(id).then(apply);
    el.addEventListener('input', () => scheduleSave(id, el.value));
  });

  // multiple choice groups
  const mcqGroups = new Set();
  root.querySelectorAll('[data-mcq-option]').forEach(btn => {
    const group = btn.closest('[data-mcq]');
    if (group) mcqGroups.add(group);
  });
  mcqGroups.forEach(group => {
    const qid = group.getAttribute('data-mcq');
    const applySelected = (letter) => {
      group.querySelectorAll('[data-mcq-option]').forEach(b => {
        b.classList.toggle('selected', b.getAttribute('data-mcq-option') === letter);
      });
    };
    if (Object.prototype.hasOwnProperty.call(memoryCache, qid)) applySelected(memoryCache[qid]);
    else loadField(qid).then(v => { if (v) applySelected(v); });
    group.querySelectorAll('[data-mcq-option]').forEach(btn => {
      btn.addEventListener('click', () => {
        const letter = btn.getAttribute('data-mcq-option');
        applySelected(letter);
        scheduleSave(qid, letter);
      });
    });
  });

  // drawing canvas
  const canvas = root.querySelector('[data-canvas]');
  if (canvas) initDrawingPad(canvas, root);
}

/* ============================================================
   DRAWING PAD — simple pointer-based sketch tool for Kegiatan 1
   ============================================================ */
function initDrawingPad(canvas, root){
  const ctx = canvas.getContext('2d');
  const id = canvas.getAttribute('data-canvas');
  let drawing = false;
  let last = null;
  let color = '#2A2118';
  let lineWidth = 4;
  const undoStack = [];

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x:(e.clientX - rect.left) * scaleX, y:(e.clientY - rect.top) * scaleY };
  }
  function pushUndo(){
    try{
      undoStack.push(canvas.toDataURL('image/png'));
      if (undoStack.length > 14) undoStack.shift();
    }catch(e){}
  }
  function persist(){ scheduleSave(id, canvas.toDataURL('image/png')); }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    drawing = true; pushUndo(); last = getPos(e);
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(last.x,last.y,lineWidth/2,0,Math.PI*2); ctx.fill();
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    last = pos;
  });
  const endStroke = () => { if (!drawing) return; drawing = false; persist(); };
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', () => { if (drawing) endStroke(); });

  root.querySelectorAll('[data-pen-color]').forEach(b => {
    b.addEventListener('click', () => {
      color = b.getAttribute('data-pen-color');
      root.querySelectorAll('[data-pen-color]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });
  root.querySelectorAll('[data-pen-width]').forEach(b => {
    b.addEventListener('click', () => {
      lineWidth = +b.getAttribute('data-pen-width');
      root.querySelectorAll('[data-pen-width]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });
  const clearBtn = root.querySelector('[data-canvas-clear]');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    pushUndo(); ctx.clearRect(0,0,canvas.width,canvas.height); persist();
  });
  const undoBtn = root.querySelector('[data-canvas-undo]');
  if (undoBtn) undoBtn.addEventListener('click', () => {
    if (!undoStack.length) return;
    const prev = undoStack.pop();
    const img = new Image();
    img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); persist(); };
    img.src = prev;
  });

  const restore = (val) => {
    if (!val) return;
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    img.src = val;
  };
  if (Object.prototype.hasOwnProperty.call(memoryCache, id)) restore(memoryCache[id]);
  else loadField(id).then(restore);
}

/* ============================================================
   NAVIGATION / PAGE-FLIP MECHANIC
   ============================================================ */
let currentIndex = 0;
let isAnimating = false;

function updateNavDisabled(){
  document.getElementById('btnPrev').disabled = isAnimating || currentIndex === 0;
  document.getElementById('btnNext').disabled = isAnimating || currentIndex === PAGES.length - 1;
}

function updateChrome(){
  document.getElementById('runningHead').textContent = PAGES[currentIndex].chapter;
  document.getElementById('pageIndicator').textContent = (currentIndex+1) + ' / ' + PAGES.length;
  document.getElementById('progressFill').style.width = (((currentIndex+1)/PAGES.length)*100).toFixed(1) + '%';
  updateNavDisabled();
  updateTocActive();
}

function goTo(targetIndex){
  if (isAnimating || targetIndex === currentIndex || targetIndex < 0 || targetIndex >= PAGES.length) return;
  const direction = targetIndex > currentIndex ? 1 : -1;
  isAnimating = true;
  updateNavDisabled();
  closeTOC();

  const flipper = document.getElementById('flipper');
  const back = document.getElementById('faceBack');
  const front = document.getElementById('faceFront');

  renderInto(back, targetIndex);
  back.scrollTop = 0;

  flipper.classList.remove('no-anim');
  void flipper.offsetWidth;
  flipper.classList.add(direction === 1 ? 'flip-next' : 'flip-prev');

  let done = false;
  const fallback = setTimeout(finish, 900);
  function finish(){
    if (done) return;
    done = true;
    flipper.removeEventListener('transitionend', onEnd);
    clearTimeout(fallback);

    renderInto(front, targetIndex);
    front.scrollTop = 0;
    back.innerHTML = '';

    flipper.classList.add('no-anim');
    flipper.classList.remove('flip-next','flip-prev');
    void flipper.offsetWidth;
    flipper.classList.remove('no-anim');

    currentIndex = targetIndex;
    updateChrome();
    isAnimating = false;
    updateNavDisabled();
  }
  function onEnd(e){
    if (e.target !== flipper || e.propertyName !== 'transform') return;
    finish();
  }
  flipper.addEventListener('transitionend', onEnd);
}

/* ============================================================
   TABLE OF CONTENTS DRAWER
   ============================================================ */
function renderTOC(){
  const list = document.getElementById('tocList');
  let html = '';
  let lastPart;
  PAGES.forEach((p, i) => {
    if (p.part !== lastPart){
      if (p.part) html += `<div class="toc-item section-label">${p.part}</div>`;
      lastPart = p.part;
    }
    html += `<button type="button" class="toc-item" data-goto="${i}" data-toc-idx="${i}"><span class="num">${String(i+1).padStart(2,'0')}</span><span>${p.chapter}</span></button>`;
  });
  list.innerHTML = html;
}
function updateTocActive(){
  document.querySelectorAll('.toc-item[data-toc-idx]').forEach(el => {
    el.classList.toggle('active', +el.getAttribute('data-toc-idx') === currentIndex);
  });
}
function openTOC(){ document.getElementById('tocOverlay').classList.add('open'); updateTocActive(); }
function closeTOC(){ document.getElementById('tocOverlay').classList.remove('open'); }

/* ============================================================
   PRINT — builds a plain printable answer sheet on demand
   ============================================================ */
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : str;
  return d.innerHTML;
}
async function preparePrint(){
  const sheet = document.getElementById('printSheet');
  const results = await Promise.all(FIELD_REGISTRY.map(async f => {
    const val = Object.prototype.hasOwnProperty.call(memoryCache, f.id) ? memoryCache[f.id] : await loadField(f.id);
    return Object.assign({}, f, {val});
  }));
  const bySection = {};
  results.forEach(r => { (bySection[r.section] = bySection[r.section] || []).push(r); });

  let html = `<h1>Energi dalam Kehidupan — LKPD Kelompok 5</h1>
  <div class="p-meta">Fisika SMA Kelas X &middot; Program Magister Pendidikan MIPA, Universitas Indraprasta PGRI Jakarta</div>`;

  Object.keys(bySection).forEach(section => {
    html += `<h2>${escapeHtml(section)}</h2>`;
    bySection[section].forEach(f => {
      html += `<div class="p-item"><span class="p-label">${escapeHtml(f.label)}</span>`;
      if (f.type === 'canvas'){
        html += f.val ? `<img src="${f.val}" alt="Gambar jawaban">` : `<div class="p-val">(belum digambar)</div>`;
      } else if (f.type === 'mcq'){
        const idx = ['A','B','C','D','E'].indexOf(f.val);
        const text = idx >= 0 && f.options ? f.options[idx] : '';
        html += `<div class="p-val">${f.val ? escapeHtml(f.val + ' — ' + text) : '(belum dipilih)'}</div>`;
      } else {
        html += `<div class="p-val">${escapeHtml(f.val || '(belum diisi)')}</div>`;
      }
      html += `</div>`;
    });
  });
  sheet.innerHTML = html;
  setTimeout(() => window.print(), 80);
}

/* ============================================================
   RESET ALL ANSWERS
   ============================================================ */
function resetAllAnswers(){
  const ok = window.confirm('Yakin ingin menghapus SEMUA jawaban yang sudah diisi? Tindakan ini tidak dapat dibatalkan.');
  if (!ok) return;
  FIELD_REGISTRY.forEach(f => {
    delete memoryCache[f.id];
    if (hasStorage()){
      try{ window.storage.delete(STORAGE_PREFIX + f.id).catch(()=>{}); }catch(e){}
    }
  });
  renderInto(document.getElementById('faceFront'), currentIndex);
  closeTOC();
  showToast('Semua jawaban telah direset');
}

/* ============================================================
   KEYBOARD & SWIPE NAVIGATION
   ============================================================ */
document.addEventListener('keydown', (e) => {
  const overlayOpen = document.getElementById('tocOverlay').classList.contains('open');
  if (overlayOpen) return;
  const activeTag = document.activeElement ? document.activeElement.tagName : '';
  if (activeTag === 'TEXTAREA' || activeTag === 'INPUT') return;
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
});

let touchStartX = null;
document.addEventListener('DOMContentLoaded', () => {
  const stageEl = document.querySelector('.flip-stage');
  if (!stageEl) return;
  stageEl.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
  stageEl.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60){ dx < 0 ? goTo(currentIndex + 1) : goTo(currentIndex - 1); }
    touchStartX = null;
  }, {passive:true});
});

/* ============================================================
   GLOBAL CLICK DELEGATION (data-goto / data-action)
   ============================================================ */
document.getElementById('app').addEventListener('click', (e) => {
  const gotoBtn = e.target.closest('[data-goto]');
  if (gotoBtn){ goTo(parseInt(gotoBtn.getAttribute('data-goto'), 10)); return; }
  const printTrigger = e.target.closest('[data-action="print"]');
  if (printTrigger){ preparePrint(); return; }
});
document.getElementById('btnPrev').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('btnNext').addEventListener('click', () => goTo(currentIndex + 1));
document.getElementById('tocBtn').addEventListener('click', openTOC);
document.getElementById('tocCloseBtn').addEventListener('click', closeTOC);
document.getElementById('tocOverlay').addEventListener('click', (e) => { if (e.target.id === 'tocOverlay') closeTOC(); });
document.getElementById('resetBtn').addEventListener('click', resetAllAnswers);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeTOC(); });

/* ============================================================
   INIT
   ============================================================ */
renderTOC();
renderInto(document.getElementById('faceFront'), 0);
updateChrome();

/* ============================================================
   DEBUG HOOKS — harmless introspection, no behavior change
   ============================================================ */
window.PAGES = PAGES;
window.FIELD_REGISTRY = FIELD_REGISTRY;
window.memoryCache = memoryCache;
window.__getCurrentIndex = () => currentIndex;
window.__isAnimating = () => isAnimating;

</script>
</body>
